<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Playhouse — Billing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f4f4;color:#111;min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0;gap:6px;flex-wrap:wrap}
.hdr-title{font-size:15px;font-weight:700;color:#333;white-space:nowrap}
.hdr-stats{display:flex;gap:16px;flex:1;justify-content:center;flex-wrap:wrap}
.hs{text-align:center}.hs-v{font-family:monospace;font-size:14px;font-weight:700;color:#111}.hs-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.05em}
.nav{display:flex;gap:3px;align-items:center}
.nbtn{padding:5px 11px;border-radius:7px;border:1px solid #ccc;background:transparent;cursor:pointer;font-size:12px;color:#666;font-family:inherit;white-space:nowrap;transition:opacity .2s}
.nbtn.active{background:#BA7517;color:#fff;border-color:#BA7517}
.nbtn.nav-locked{opacity:.4;cursor:not-allowed}
.reset-btn{padding:5px 11px;border-radius:7px;border:1px solid #C0392B;background:transparent;cursor:pointer;font-size:12px;color:#C0392B;font-family:inherit;white-space:nowrap;font-weight:600;transition:all .15s}
.reset-btn:hover{background:#C0392B;color:#fff}
.reset-btn.nav-locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.content{flex:1;overflow-y:auto}
.exp-banner{background:#FFF8EC;border-bottom:2px solid #FACF80;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.exp-banner-txt{font-size:12px;color:#7A4F00;font-weight:500}
.exp-banner-btns{display:flex;gap:6px;flex-shrink:0}
.exp-banner-btn{padding:4px 11px;border-radius:6px;border:1px solid #BA7517;background:transparent;color:#BA7517;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600}
.exp-banner-btn.pri{background:#BA7517;color:#fff}
.exp-banner-btn.dim{border-color:#ccc;color:#aaa}
.legend{display:flex;gap:12px;padding:9px 13px 3px;font-size:11px;color:#666;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px}
.ldot{width:10px;height:10px;border-radius:3px;border:1px solid;flex-shrink:0}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:7px;padding:6px 13px 13px}
.seat{border-radius:8px;padding:9px 5px;cursor:pointer;border:2px solid;text-align:center;transition:all .1s;user-select:none;position:relative}
.seat:hover{transform:translateY(-1px);box-shadow:0 2px 7px rgba(0,0,0,.12)}
.seat:active{transform:scale(.97)}
.seat.free{background:#EAF3DE;border-color:#3B6D11}
.seat.occ{background:#FAEEDA;border-color:#BA7517}
.seat.blk{background:#E6F1FB;border-color:#185FA5}
.sn{font-family:monospace;font-size:12px;font-weight:700}
.seat.free .sn{color:#27500A}.seat.occ .sn{color:#633806}.seat.blk .sn{color:#0C447C}
.s-lbl{font-size:10px;margin-top:2px;color:#3B6D11}
.s-lbl-blk{font-size:9px;margin-top:2px;color:#185FA5;font-weight:700;letter-spacing:.05em}
.s-tim{font-family:monospace;font-size:10px;margin-top:2px;color:#BA7517;font-weight:600}
.s-grp{font-size:10px;margin-top:1px;color:#888}
.grp-dot{width:7px;height:7px;border-radius:50%;position:absolute;top:4px;right:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:16px;overflow-y:auto}
.mbox{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:370px;box-shadow:0 8px 32px rgba(0,0,0,.2);margin:auto;flex-shrink:0}
.mbox h3{font-size:15px;font-weight:600;margin:0 0 16px;color:#111}
.flabel{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:block}
.fgrp{margin-bottom:12px}
.fgrp input,.fgrp select{width:100%;padding:8px 10px;border-radius:7px;border:1px solid #ccc;background:#f9f9f9;color:#111;font-family:inherit;font-size:13px;outline:none}
.fgrp input:focus,.fgrp select:focus{border-color:#BA7517;background:#fff}
.pin-display{display:flex;justify-content:center;gap:10px;margin:10px 0 14px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;background:transparent;transition:all .15s}
.pin-dot.filled{background:#BA7517;border-color:#BA7517}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pin-key{padding:14px 0;border-radius:9px;border:1px solid #e0e0e0;background:#fff;font-size:18px;font-weight:600;cursor:pointer;font-family:monospace;text-align:center;transition:all .1s}
.pin-key:hover{background:#f5f5f5;border-color:#BA7517}
.pin-key:active{background:#FAEEDA;transform:scale(.96)}
.pin-key.del{font-size:14px;color:#888}
.pin-key.ok{background:#BA7517;color:#fff;border-color:#BA7517}
.pin-key.ok:hover{background:#9a6010}
.counter{display:flex;align-items:center;gap:8px}
.cbtn{width:34px;height:34px;border-radius:7px;border:1px solid #ccc;background:#f5f5f5;color:#333;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.cbtn:hover{border-color:#BA7517;color:#BA7517}
.cval{font-family:monospace;font-size:20px;font-weight:700;min-width:28px;text-align:center;color:#111}
.pay-row{display:flex;gap:6px}
.pbtn{flex:1;padding:8px 0;border-radius:7px;border:1px solid #ccc;background:transparent;font-size:12px;cursor:pointer;color:#666;font-family:inherit;font-weight:500}
.pbtn.sel{border-color:#BA7517;background:#FAEEDA;color:#633806;font-weight:700}
.btn-pri{width:100%;padding:10px;background:#BA7517;border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:7px}
.btn-pri:hover{background:#9a6010}
.btn-pri.red{background:#C0392B}.btn-pri.red:hover{background:#a93226}
.btn-pri.blue{background:#185FA5}.btn-pri.blue:hover{background:#0f4a82}
.btn-pri.grn{background:#27AE60}.btn-pri.grn:hover{background:#1e8449}
.btn-pri.whatsapp{background:#25D366;border:none}.btn-pri.whatsapp:hover{background:#1da851}
.btn-sec{width:100%;padding:8px;background:transparent;border:1px solid #ddd;border-radius:8px;color:#888;font-family:inherit;font-size:12px;cursor:pointer;margin-top:6px}
.btn-sec:hover{border-color:#999;color:#333}
.bill-box{background:#f7f7f7;border-radius:8px;padding:12px;margin-bottom:12px}
.brow{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid #eee}
.brow:last-child{border-bottom:none}
.brow .lbl{color:#888}.brow .val{font-family:monospace;color:#111;font-weight:500}
.btotal{font-family:monospace;font-size:24px;font-weight:700;color:#BA7517;text-align:center;padding:5px 0}
.hint-box{background:#FFF8EC;border:1px solid #FACF80;border-radius:7px;padding:7px 10px;font-size:11px;color:#7A4F00;margin-bottom:8px;line-height:1.6}
.warn-box{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:7px;padding:7px 10px;font-size:11px;color:#991B1B;margin-bottom:8px}
.sec-box{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.rpt{padding:14px}
.rpt-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
.rstat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px;text-align:center}
.rstat-v{font-family:monospace;font-size:15px;font-weight:700}.rstat-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.sec-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;margin-top:2px}
.pay-bkdn{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:9px 12px;margin-bottom:12px}
.pbrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid #f0f0f0}
.pbrow:last-child{border-bottom:none}
.tx-item{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:9px 12px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.tx-seat{font-size:10px;color:#999}.tx-name{font-size:13px;font-weight:500;color:#111}.tx-time{font-size:10px;color:#999;margin-top:1px}
.tx-amt{font-family:monospace;font-size:14px;font-weight:700;text-align:right}
.tx-print{padding:3px 8px;border-radius:5px;border:1px solid #ddd;background:transparent;font-size:11px;cursor:pointer;color:#888;margin-top:4px;display:block;width:100%;font-family:inherit}
.tx-print:hover{border-color:#BA7517;color:#BA7517}
.tag{font-size:10px;padding:2px 6px;border-radius:20px;margin-top:3px;display:inline-block;font-weight:600;text-transform:uppercase}
.tag.cash{background:#EAF3DE;color:#27500A}.tag.upi{background:#EEEDFE;color:#3C3489}.tag.card{background:#E6F1FB;color:#0C447C}
.empty{text-align:center;color:#aaa;padding:40px;font-size:13px}
.btn-row{display:flex;gap:7px;margin-top:7px}
.menu-item-row{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:9px 11px;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.mi-btn{padding:3px 9px;border-radius:5px;border:1px solid;font-size:11px;cursor:pointer;font-family:inherit;background:transparent}
.add-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f3f3f3}
.add-row:last-child{border-bottom:none}
.date-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.dpill{padding:4px 10px;border-radius:20px;border:1px solid #ddd;background:transparent;color:#666;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.dpill.active{border-color:#BA7517;background:#FAEEDA;color:#633806;font-weight:600}
.exp-btns{display:flex;gap:7px;margin-bottom:12px}
.exp-btn{flex:1;padding:8px;border:1px solid #ccc;border-radius:7px;background:transparent;font-size:12px;cursor:pointer;color:#555;font-family:inherit}
.exp-btn:hover{border-color:#BA7517;color:#BA7517}
.big-bill{text-align:center;padding:16px 0}
.big-bill-amt{font-family:monospace;font-size:44px;font-weight:700;color:#BA7517;line-height:1}
.big-bill-lbl{font-size:12px;color:#888;margin-top:6px}
.settings-wrap{padding:14px;max-width:500px}
.reset-inputs{display:flex;gap:10px;margin-bottom:14px}
.reset-field{flex:1;text-align:center}
.reset-field label{display:block;font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.reset-field input{width:100%;padding:10px;border-radius:8px;border:2px solid #ddd;background:#f9f9f9;color:#111;font-family:monospace;font-size:22px;font-weight:700;text-align:center;outline:none}
.reset-field input:focus{border-color:#C0392B;background:#fff}
.reset-preview{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:10px 14px;margin-bottom:12px;text-align:center}
.reset-preview-count{font-family:monospace;font-size:32px;font-weight:700;color:#C0392B}
.reset-preview-label{font-size:11px;color:#888;margin-top:3px}
.reset-preview-range{font-size:10px;color:#aaa;margin-top:4px}
/* phone highlight box */
.phone-box{background:#F0F7FF;border:1.5px solid #7AB8F5;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.phone-box .flabel{color:#185FA5;margin-bottom:5px}
.phone-box input{background:#fff;border-color:#7AB8F5;font-size:15px;padding:9px 10px;letter-spacing:.05em}
/* persons edit badge */
.persons-badge{display:inline-flex;align-items:center;gap:4px;background:#FFF8EC;border:1px solid #FACF80;border-radius:6px;padding:3px 8px;font-size:11px;color:#7A4F00;margin-left:6px;vertical-align:middle}
.nav-lock-toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#C0392B;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;pointer-events:none}
.nav-lock-toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-title" id="hdr-cafe-name">🎲 Playhouse</div>
    <div class="hdr-stats" id="stats"></div>
    <div class="nav">
      <button class="nbtn active" onclick="setView('floor')" id="btn-floor">Floor</button>
      <button class="nbtn" onclick="setView('menu')" id="btn-menu">Menu</button>
      <button class="nbtn" onclick="setView('report')" id="btn-report">Report</button>
      <button class="nbtn" onclick="setView('settings')" id="btn-settings">⚙</button>
      <button class="reset-btn" onclick="openReset()">🗑 Reset</button>
    </div>
  </div>
  <div id="export-banner" style="display:none"></div>
  <div class="content" id="content"></div>
</div>
<div class="nav-lock-toast" id="nav-lock-toast">⚠ Please press Done before switching screens</div>
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this&&!_pinActive&&!_receiptActive)closeModal()"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBaocyc92pXMmmNx_foVZvZSYX3L8NYuTU",
  authDomain: "the-playhouse-cafe.firebaseapp.com",
  projectId: "the-playhouse-cafe",
  storageBucket: "the-playhouse-cafe.firebasestorage.app",
  messagingSenderId: "321873657191",
  appId: "1:321873657191:web:feababb0723ca3ef2a03c2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
window.db = db;

const TOTAL_SEATS = 48;
const GRP_COLORS = ['#E67E22','#2980B9','#27AE60','#8E44AD','#C0392B','#16A085','#D35400','#1ABC9C','#F39C12','#7F8C8D'];
const MENU_CATS = ['Hot Drinks','Cold Drinks','Food','Snacks','Desserts','Other'];
const DEFAULT_MENU = [
  {id:'m01',name:'Filter Coffee',price:30,category:'Hot Drinks'},
  {id:'m02',name:'Masala Chai',price:25,category:'Hot Drinks'},
  {id:'m03',name:'Green Tea',price:20,category:'Hot Drinks'},
  {id:'m04',name:'Cold Coffee',price:60,category:'Cold Drinks'},
  {id:'m05',name:'Fresh Lime Soda',price:40,category:'Cold Drinks'},
  {id:'m06',name:'Lassi',price:50,category:'Cold Drinks'},
  {id:'m07',name:'Idli Sambar',price:60,category:'Food'},
  {id:'m08',name:'Masala Dosa',price:80,category:'Food'},
  {id:'m09',name:'Sandwich',price:70,category:'Food'},
  {id:'m10',name:'Samosa',price:20,category:'Snacks'},
  {id:'m11',name:'Vada',price:30,category:'Snacks'},
  {id:'m12',name:'Banana Cake',price:40,category:'Desserts'},
];

let settings={cafeName:'THE PLAYHOUSE',address:'',ratePerHour:99,pin:'1234',lastExportDate:'',largeBillThreshold:500};
let seats=mkSeats(),txns=[],menuItems=JSON.parse(JSON.stringify(DEFAULT_MENU));
let groupColorMap={},gcIdx=0,currentView='floor',selectedMethod='cash';
let cartItems={},coInfo=null,reportDate=todayStr();
let _pinCallback=null,_pinValue='',_pinActive=false,_lastDateStr=todayStr();
let customerCounter=1;
let _receiptActive = false;

function mkSeats(){return Array.from({length:TOTAL_SEATS},(_,i)=>({id:i+1,occupied:false,name:'',t0:null,groupId:null,groupSize:0,blocked:false,blockInfo:null}));}

async function saveAll(){await db.collection("playhouse").doc("data").set({settings,seats,txns,menuItems,customerCounter});}
async function loadAll(){
  const doc=await db.collection("playhouse").doc("data").get();
  if(doc.exists){const d=doc.data();settings=d.settings||settings;seats=d.seats||seats;txns=d.txns||txns;menuItems=d.menuItems||menuItems;customerCounter=d.customerCounter||1;}
}

function getGrpColor(gid){if(!groupColorMap[gid]){groupColorMap[gid]=GRP_COLORS[gcIdx%GRP_COLORS.length];gcIdx++;}return groupColorMap[gid];}
function calcSeatCharge(t0,persons){const mins=(Date.now()-t0)/60000,r=settings.ratePerHour;return mins<=60?r*persons:Math.ceil((r+(r/60)*(mins-60))*persons);}
function calcCartTotal(){return Object.entries(cartItems).reduce((s,[id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?s+it.price*qty:s;},0);}
function getCartAddons(){return Object.entries(cartItems).map(([id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?{name:it.name,price:it.price,qty}:null;}).filter(Boolean);}
function fmtDur(t0){const s=Math.floor((Date.now()-t0)/1000);return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');}
function fmtMins(ms){const m=Math.floor(ms/60000);return(Math.floor(m/60)>0?Math.floor(m/60)+'h ':'')+m%60+'m';}
function inr(n){return '₹'+Math.round(n).toLocaleString('en-IN');}
function todayStr(){return new Date().toDateString();}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toDateString();}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return '—';const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function allDates(){const dates=[...new Set(txns.map(t=>t.date))].sort((a,b)=>new Date(b)-new Date(a));if(!dates.includes(todayStr()))dates.unshift(todayStr());return dates;}
function txnsForDate(d){return txns.filter(t=>t.date===d);}

function showNavLockToast(){
  const t=document.getElementById('nav-lock-toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function lockNav(){
  _receiptActive=true;
  document.querySelectorAll('.nbtn,.reset-btn').forEach(b=>b.classList.add('nav-locked'));
}
function unlockNav(){
  _receiptActive=false;
  document.querySelectorAll('.nbtn,.reset-btn').forEach(b=>b.classList.remove('nav-locked'));
}

// ═══ PIN ═══
function requirePIN(title,callback){if(!settings.pin){callback();return;}_pinCallback=callback;_pinValue='';_pinActive=true;showModal(pinModalHTML(title,''));}
function pinModalHTML(title,err){
  const dots=Array.from({length:4},(_,i)=>`<div class="pin-dot${i<_pinValue.length?' filled':''}"></div>`).join('');
  return `<h3 style="text-align:center">🔐 ${title}</h3><p style="font-size:12px;color:#888;text-align:center;margin:-8px 0 10px">Enter manager PIN</p><div class="pin-display">${dots}</div>${err?`<div style="text-align:center;color:#C0392B;font-size:12px;margin-bottom:8px">${err}</div>`:''}<div class="pin-grid">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinKey('${n}')">${n}</button>`).join('')}<button class="pin-key del" onclick="pinDel()">⌫</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key ok" onclick="pinSubmit()">✓</button></div><button class="btn-sec" onclick="pinCancel()">Cancel</button>`;
}
function pinKey(d){if(_pinValue.length>=6)return;_pinValue+=d;const dots=document.getElementById('overlay').querySelectorAll('.pin-dot');dots.forEach((dot,i)=>dot.classList.toggle('filled',i<_pinValue.length));if(_pinValue.length>=4)setTimeout(pinSubmit,120);}
function pinDel(){_pinValue=_pinValue.slice(0,-1);const dots=document.querySelectorAll('.pin-dot');dots.forEach((dot,i)=>dot.classList.toggle('filled',i<_pinValue.length));}
function pinSubmit(){if(_pinValue===settings.pin){const cb=_pinCallback;_pinCallback=null;_pinActive=false;_pinValue='';closeModal();cb();}else{_pinValue='';const ov=document.getElementById('overlay');if(ov)ov.querySelector('.mbox').innerHTML=pinModalHTML('Access Denied','Incorrect PIN — try again');}}
function pinCancel(){_pinCallback=null;_pinActive=false;_pinValue='';closeModal();}

window.addEventListener('beforeunload',function(e){const active=seats.filter(s=>s.occupied).length;if(active>0){e.preventDefault();e.returnValue=`${active} seat(s) still active!`;return e.returnValue;}});

function renderStats(){
  const occ=seats.filter(s=>s.occupied).length,blk=seats.filter(s=>s.blocked).length,rev=txnsForDate(todayStr()).reduce((s,t)=>s+t.totalAmount,0);
  document.getElementById('hdr-cafe-name').textContent='🎲 '+settings.cafeName;
  document.getElementById('stats').innerHTML=`<div class="hs"><div class="hs-v">${occ}/${TOTAL_SEATS}</div><div class="hs-l">Occupied</div></div><div class="hs"><div class="hs-v">${inr(rev)}</div><div class="hs-l">Today</div></div>${blk?`<div class="hs"><div class="hs-v" style="color:#185FA5">${blk}</div><div class="hs-l">Reserved</div></div>`:''}`;
}

function checkExportBanner(){
  const yd=yesterday(),ytx=txnsForDate(yd),banner=document.getElementById('export-banner');
  if(!banner)return;

  else{banner.style.display='none';}

setInterval(()=>{const today=todayStr();if(today!==_lastDateStr){const prev=_lastDateStr;_lastDateStr=today;const ptx=txnsForDate(prev);if(ptx.length>0&&settings.lastExportDate!==prev){const rev=ptx.reduce((s,t)=>s+t.totalAmount,0);showModal(`<div style="text-align:center;margin-bottom:14px"><div style="font-size:32px;margin-bottom:8px">🌙</div><h3>New day — export yesterday?</h3></div><div class="hint-box">${ptx.length} sessions · ${inr(rev)} revenue</div><button class="btn-pri" onclick="exportCSV('${prev}');markExported('${prev}');closeModal()">📊 Export CSV</button><button class="btn-pri grn" onclick="exportPDF('${prev}');markExported('${prev}');closeModal()">📄 Export PDF</button><button class="btn-sec" onclick="markExported('${prev}');closeModal()">Skip</button>`);}}},60000);

// ═══ RESET ═══
let _resetCutoff=0;

function openReset(){
  if(_receiptActive){showNavLockToast();return;}
  requirePIN('Reset Data',showResetModal);
}
function showResetModal(){
  const rsvCount=seats.filter(s=>s.blocked).length;
  showModal(`<h3 style="color:#C0392B">🗑 Reset Data</h3>
    <p style="font-size:12px;color:#888;margin:-8px 0 16px;line-height:1.6">Enter how many <strong>days</strong> and <strong>hours</strong> of recent transactions to delete.</p>
    <div class="reset-inputs">
      <div class="reset-field"><label>Days</label><input type="number" id="reset-days" min="0" max="365" value="0" oninput="updateResetPreview()"></div>
      <div style="display:flex;align-items:center;padding-top:22px;color:#bbb;font-size:24px">+</div>
      <div class="reset-field"><label>Hours</label><input type="number" id="reset-hours" min="0" max="23" value="0" oninput="updateResetPreview()"></div>
    </div>
    <div class="reset-preview">
      <div class="reset-preview-count" id="reset-count">0</div>
      <div class="reset-preview-label" id="reset-label">Enter days or hours above</div>
      <div class="reset-preview-range" id="reset-range"></div>
    </div>
    ${rsvCount>0
      ? '<div class="hint-box" style="margin-bottom:8px">⚠ <strong>' + rsvCount + ' reservation' + (rsvCount>1?'s':'') + '</strong> currently active — you can clear these too.</div>'
      : ''}
    <div class="warn-box">⚠ Permanently deletes from Firebase.</div>
    <button class="btn-sec" style="border-color:#185FA5;color:#185FA5;margin-top:0" onclick="exportAllCSV()">📊 Export Backup First</button>
    <button class="btn-pri red" id="reset-confirm-btn" onclick="confirmReset()" disabled style="opacity:.4;cursor:not-allowed">🗑 Proceed</button>
    ${rsvCount>0
      ? '<button class="btn-pri blue" style="margin-top:6px" onclick="confirmClearReservationsOnly()">🔒 Clear Reservations Only</button>'
      : ''}
    <button class="btn-sec" onclick="closeModal()">Cancel</button>`);
  setTimeout(updateResetPreview, 30);
}
function updateResetPreview(){
  const days=parseInt(document.getElementById('reset-days')?.value)||0;
  const hours=parseInt(document.getElementById('reset-hours')?.value)||0;
  const totalMs=(days*24+hours)*60*60*1000;
  _resetCutoff=Date.now()-totalMs;
  const toDelete=txns.filter(t=>t.t1>=_resetCutoff);
  const countEl=document.getElementById('reset-count'),labelEl=document.getElementById('reset-label'),rangeEl=document.getElementById('reset-range'),btnEl=document.getElementById('reset-confirm-btn');
  if(countEl)countEl.textContent=toDelete.length;
  if(labelEl){
    if(days===0&&hours===0){labelEl.textContent='Enter days or hours above';}
    else{const ts=(days>0?days+' day'+(days>1?'s':''):'')+(days>0&&hours>0?' + ':'')+(hours>0?hours+' hour'+(hours>1?'s':''):'');labelEl.textContent='transaction'+(toDelete.length!==1?'s':'')+' from the last '+ts+' will be deleted';}
  }
  if(rangeEl&&totalMs>0){rangeEl.textContent='From '+new Date(_resetCutoff).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+' → Now';}else if(rangeEl){rangeEl.textContent='';}
  if(btnEl){const can=totalMs>0&&toDelete.length>0;btnEl.disabled=!can;btnEl.style.opacity=can?'1':'0.4';btnEl.style.cursor=can?'pointer':'not-allowed';btnEl.textContent='🗑 Delete '+toDelete.length+' Transaction'+(toDelete.length!==1?'s':'');}
}
function confirmReset(){
  const toDelete=txns.filter(t=>t.t1>=_resetCutoff);
  if(!toDelete.length){alert('No transactions in that range.');return;}
  const rsvCount=seats.filter(s=>s.blocked).length;
  const fromStr=new Date(_resetCutoff).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  let html='<h3 style="text-align:center;color:#C0392B">⚠ Confirm Delete</h3>'
    +'<div style="text-align:center;margin:14px 0">'
    +'<div style="font-family:monospace;font-size:52px;font-weight:700;color:#C0392B;line-height:1">'+toDelete.length+'</div>'
    +'<div style="font-size:13px;color:#555;margin-top:8px">transaction'+(toDelete.length!==1?'s':'')+' will be permanently deleted</div>'
    +'<div style="font-size:11px;color:#aaa;background:#f7f7f7;border-radius:6px;padding:5px 10px;display:inline-block;margin-top:7px">From '+fromStr+' → Now</div>'
    +'</div>'
    +'<div class="warn-box" style="text-align:center">Cannot be undone.</div>';
  if(rsvCount>0){
    html+='<button class="btn-pri red" style="margin-top:0" onclick="doResetTxns();confirmClearReservationsOnly()">🗑 Delete + Also Clear '+rsvCount+' Reservation'+(rsvCount>1?'s':'')+'</button>'
         +'<button class="btn-sec" style="border-color:#C0392B;color:#C0392B;margin-top:6px" onclick="doResetTxns()">Delete Transactions Only</button>';
  } else {
    html+='<button class="btn-pri red" style="margin-top:0" onclick="doResetTxns()">Yes — Delete</button>';
  }
  html+='<button class="btn-sec" onclick="showResetModal()">← Go Back</button>';
  showModal(html);
}
function confirmClearReservationsOnly(){
  const rsvCount=seats.filter(s=>s.blocked).length;
  if(!rsvCount){showModal('<h3>No Reservations</h3><p style="color:#888;font-size:13px">There are no active reservations to clear.</p><button class="btn-sec" onclick="closeModal()">OK</button>');return;}
  let rsvList='';
  seats.filter(s=>s.blocked).forEach(function(s){
    const bi=s.blockInfo||{};
    const dateStr=bi.date?new Date(bi.date+'T00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
    rsvList+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#333;padding:5px 0;border-bottom:1px solid #eee">'
      +'<span style="font-weight:500">'+(bi.name||'—')+'</span>'
      +'<span style="color:#185FA5">'+dateStr+(bi.time?' '+bi.time:'')+'</span>'
      +'</div>';
  });
  showModal('<h3 style="text-align:center;color:#185FA5">🔒 Clear All Reservations?</h3>'
    +'<div style="text-align:center;margin:10px 0 14px">'
    +'<div style="font-family:monospace;font-size:52px;font-weight:700;color:#185FA5;line-height:1">'+rsvCount+'</div>'
    +'<div style="font-size:13px;color:#555;margin-top:6px">reservation'+(rsvCount!==1?'s':'')+' will be removed</div>'
    +'</div>'
    +'<div style="max-height:160px;overflow-y:auto;background:#f7f7f7;border-radius:8px;padding:8px 12px;margin-bottom:12px">'+rsvList+'</div>'
    +'<div class="warn-box" style="text-align:center">Reserved seats become <strong>free</strong>. Cannot be undone.</div>'
    +'<button class="btn-pri blue" style="margin-top:0" onclick="doClearReservations()">Yes — Clear All Reservations</button>'
    +'<button class="btn-sec" onclick="closeModal()">Keep Reservations</button>');
}
function doResetTxns(){
  const before=txns.length;
  txns=txns.filter(t=>t.t1<_resetCutoff);
  const deleted=before-txns.length;
  saveAll();renderStats();
  if(currentView==='report')renderReport();else if(currentView==='floor')renderFloor();
  showModal('<div style="text-align:center;padding:14px 0">'
    +'<div style="font-size:48px;margin-bottom:10px">✅</div>'
    +'<h3>Transactions Deleted</h3>'
    +'<p style="font-size:13px;color:#888;margin-top:10px;line-height:1.8">'
    +'<span style="font-family:monospace;font-size:26px;font-weight:700;color:#C0392B;display:block">'+deleted+'</span>'
    +'transaction'+(deleted!==1?'s':'')+' deleted.<br>'
    +'<strong>'+txns.length+'</strong> remaining.</p></div>'
    +'<button class="btn-pri grn" onclick="closeModal()">Done</button>');
}
function doClearReservations(){
  const rsvCleared=seats.filter(s=>s.blocked).length;
  seats=seats.map(s=>s.blocked?Object.assign({},s,{blocked:false,blockInfo:null}):s);
  saveAll();renderStats();
  if(currentView==='floor')renderFloor();
  showModal('<div style="text-align:center;padding:14px 0">'
    +'<div style="font-size:48px;margin-bottom:10px">✅</div>'
    +'<h3>Reservations Cleared</h3>'
    +'<p style="font-size:13px;color:#888;margin-top:10px;line-height:1.8">'
    +'<span style="font-family:monospace;font-size:26px;font-weight:700;color:#185FA5;display:block">'+rsvCleared+'</span>'
    +'reservation'+(rsvCleared!==1?'s':'')+' removed.<br>Seats are now free.</p></div>'
    +'<button class="btn-pri grn" onclick="closeModal()">Done</button>');
}

function tickUpdate(){if(currentView!=='floor')return;seats.forEach(s=>{if(s.occupied){const te=document.getElementById('t'+s.id);if(te)te.textContent=fmtDur(s.t0);}});renderStats();}
function openFreeOptions(id){showModal(`<h3>Seat #${String(id).padStart(2,'0')}</h3><p style="font-size:12px;color:#888;margin:-8px 0 14px">What would you like to do?</p><button class="btn-pri" style="margin-top:0" onclick="closeModal();openCheckin(${id})">✓ Check In Guest</button><button class="btn-pri blue" onclick="closeModal();openBlockSeat(${id})">🔒 Reserve for Appointment</button><button class="btn-sec" onclick="closeModal()">Cancel</button>`);}

// ═══ CHECK-IN ═══
function openCheckin(startId,prefillName=''){
  showModal(`<h3>Check in — seat #${String(startId).padStart(2,'0')}</h3>
    <div class="fgrp"><label class="flabel">Customer name (leave blank for auto ID)</label>
      <input id="ci-name" placeholder="e.g. Ravi — or leave blank → gets #${String(customerCounter).padStart(3,'0')}" value="${prefillName}" autocomplete="off" style="text-transform:uppercase">
    </div>
    <div class="fgrp"><label class="flabel">Number of persons</label>
      <div class="counter"><button class="cbtn" onclick="chgP(-1)">−</button><span class="cval" id="ci-p">1</span><button class="cbtn" onclick="chgP(1)">+</button><span style="font-size:11px;color:#999">× 1 seat each</span></div>
    </div>
    <div class="hint-box"><strong>${inr(settings.ratePerHour)}/hr per seat · Minimum 1 hour</strong></div>
    <div id="ci-warn"></div>
    <button class="btn-pri" onclick="doCheckin(${startId})">Start Session</button>
    <button class="btn-sec" onclick="closeModal()">Cancel</button>`);

function chgP(d){const el=document.getElementById('ci-p');const n=Math.max(1,parseInt(el.textContent)+d);el.textContent=n;const avail=seats.filter(s=>!s.occupied&&!s.blocked).length;const w=document.getElementById('ci-warn');if(w)w.innerHTML=n>avail?`<div class="warn-box">Only ${avail} free seats!</div>`:'';}
function doCheckin(startId){
  const persons=parseInt(document.getElementById('ci-p').textContent);
  let name=document.getElementById('ci-name').value.trim().toUpperCase();
  if(!name){name='#'+String(customerCounter).padStart(3,'0');customerCounter++;}
  const free=seats.filter(s=>!s.occupied&&!s.blocked).sort((a,b)=>{const ai=a.id>=startId?a.id-startId:a.id+TOTAL_SEATS;const bi=b.id>=startId?b.id-startId:b.id+TOTAL_SEATS;return ai-bi;});
  if(free.length<persons){alert(`Only ${free.length} free seats!`);return;}
  const toOcc=free.slice(0,persons).map(s=>s.id);const gid='g'+Date.now(),t0=Date.now();
  seats=seats.map(s=>toOcc.includes(s.id)?{...s,occupied:true,name,t0,groupId:gid,groupSize:persons}:s);

function chgBlk(d){const el=document.getElementById('blk-n');el.textContent=Math.max(1,parseInt(el.textContent)+d);}
function chgRsvCart(itemId,d){
  if(!window._rsvCart)window._rsvCart={};
  window._rsvCart[itemId]=Math.max(0,(window._rsvCart[itemId]||0)+d);
  if(!window._rsvCart[itemId])delete window._rsvCart[itemId];
  const el=document.getElementById('rsvcart-'+itemId);
  if(el)el.textContent=window._rsvCart[itemId]||0;
  const total=Object.entries(window._rsvCart).reduce((s,[id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?s+it.price*qty:s;},0);
  const te=document.getElementById('rsv-total');if(te)te.textContent=inr(total);
}
function doBlockSeat(startId){
  const name=document.getElementById('blk-name').value.trim();
  const persons=parseInt(document.getElementById('blk-n').textContent);
  const date=document.getElementById('blk-date').value;
  const time=document.getElementById('blk-time').value;
  const note=document.getElementById('blk-note').value.trim();
  const preOrder=Object.entries(window._rsvCart||{}).map(([id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?{name:it.name,price:it.price,qty}:null;}).filter(Boolean);
  const free=seats.filter(s=>!s.occupied&&!s.blocked).sort((a,b)=>{const ai=a.id>=startId?a.id-startId:a.id+TOTAL_SEATS;const bi=b.id>=startId?b.id-startId:b.id+TOTAL_SEATS;return ai-bi;});
  if(free.length<persons){alert(`Only ${free.length} free seats!`);return;}
  const toBlk=free.slice(0,persons).map(s=>s.id);
  seats=seats.map(s=>toBlk.includes(s.id)?{...s,blocked:true,blockInfo:{name,persons,date,time,note,preOrder}}:s);
  window._rsvCart={};
  saveAll();closeModal();if(currentView==='floor')renderFloor();
}
function openBlockedOptions(id){

  const preOrderHTML=bi.preOrder&&bi.preOrder.length?
    `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #eee">

      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#BA7517;padding-top:4px;margin-top:4px;border-top:1px dashed #eee"><span>Pre-order total</span><span>${inr(bi.preOrder.reduce((s,a)=>s+a.price*a.qty,0))}</span></div>

    <button class="btn-sec" style="border-color:#C0392B;color:#C0392B" onclick="requirePIN('Remove Reservation',()=>unblockSeat(${id}))">✕ Remove</button>
    <button class="btn-sec" onclick="closeModal()">Close</button>`);
}
function convertToCheckin(id){
  const seat=seats.find(s=>s.id===id),bi=seat.blockInfo||{};
  const name=bi.name||'';
  if(bi.preOrder&&bi.preOrder.length){
    cartItems={};

  seats=seats.map(s=>s.id===id?{...s,blocked:false,blockInfo:null}:s);

function editBlockedSeat(id){
  const bi=(seats.find(s=>s.id===id)||{}).blockInfo||{};

  window._rsvCart={};
  if(bi.preOrder)bi.preOrder.forEach(a=>{const it=menuItems.find(m=>m.name===a.name);if(it)window._rsvCart[it.id]=a.qty;});
  const menuHTML=cats.map(cat=>{

// counter helper for Edit Session persons
function chgEsP(d){
  const el=document.getElementById('es-p');
  const cur=parseInt(el.textContent);
  const avail=seats.filter(s=>!s.occupied&&!s.blocked).length;
  const newVal=Math.max(1,cur+d);
  if(d>0&&avail<1){const h=document.getElementById('es-p-hint');if(h)h.textContent='⚠ No free seats';return;}
  el.textContent=newVal;
  const h=document.getElementById('es-p-hint');
  if(h){
    if(newVal<cur) h.textContent=`← will free ${cur-newVal} seat(s)`;
    else if(newVal>cur) h.textContent=`← will use ${newVal-cur} free seat(s)`;
    else h.textContent='';
  }
}

function doEditSession(gid){
  const name=document.getElementById('es-name').value.trim();
  const t0Input=document.getElementById('es-t0')?.value;
  const newT0=t0Input?new Date(t0Input).getTime():null;
  const newPersons=parseInt(document.getElementById('es-p')?.textContent)||0;
  if(newT0&&newT0>Date.now()){alert('Start time cannot be in the future.');return;}

  const grp=seats.filter(s=>s.groupId===gid);
  const currentPersons=grp.length;

  if(newPersons<currentPersons){
    // Free extra seats from the end of the group
    const toFree=grp.slice(newPersons).map(s=>s.id);
    seats=seats.map(s=>{
      if(s.groupId===gid&&toFree.includes(s.id)){
        return {...s,occupied:false,name:'',t0:null,groupId:null,groupSize:0};
      }
      if(s.groupId===gid){
        return {...s,name:name||s.name,groupSize:newPersons,...(newT0?{t0:newT0}:{})};
      }
      return s;
    });
  } else if(newPersons>currentPersons){
    // Occupy additional free seats
    const needed=newPersons-currentPersons;
    const refId=grp[grp.length-1].id; // last seat in group
    const free=seats.filter(s=>!s.occupied&&!s.blocked).sort((a,b)=>{
      const ai=a.id>refId?a.id-refId:a.id+TOTAL_SEATS;
      const bi=b.id>refId?b.id-refId:b.id+TOTAL_SEATS;
      return ai-bi;
    });
    if(free.length<needed){alert(`Only ${free.length} free seat(s) available.`);return;}
    const toOcc=free.slice(0,needed).map(s=>s.id);
    const t0use=newT0||grp[0].t0;
    seats=seats.map(s=>{
      if(toOcc.includes(s.id)) return {...s,occupied:true,name:name||grp[0].name,t0:t0use,groupId:gid,groupSize:newPersons};
      if(s.groupId===gid) return {...s,name:name||s.name,groupSize:newPersons,...(newT0?{t0:newT0}:{})};
      return s;
    });
  } else {
    // Same count — just update name and t0
    seats=seats.map(s=>s.groupId===gid?{...s,name:name||s.name,...(newT0&&newT0>0?{t0:newT0}:{})}:s);
  }

  if(coInfo&&coInfo.gid===gid){coInfo.persons=newPersons;if(newT0)coInfo.t0=newT0;}
  saveAll();closeModal();if(currentView==='floor')renderFloor();
}

function confirmCancelSession(gid){const grp=seats.filter(s=>s.groupId===gid),s0=grp[0];showModal(`<h3>Cancel Session?</h3><div class="warn-box">⚠ Frees all ${s0.groupSize} seat(s) with NO charge.</div><button class="btn-pri red" style="margin-top:0" onclick="doCancelSession('${gid}')">Yes, Cancel — No Charge</button><button class="btn-sec" onclick="openCheckout('${gid}')">No — Back to Checkout</button>`);}

function chgEditCart(itemId,d,txId){

function exportAllCSV(){const rows=[['Date','Customer','Phone','Persons','Seats','Check-in','Check-out','Duration(min)','Seat Charge','Food','Total','Payment'],...txns.map(t=>{const sl=t.seatIds.join(' ');const dur=Math.floor((t.t1-t.t0)/60000);const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;return[t.date,`"${t.name}"`,t.phone||'',t.persons,`"${sl}"`,new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),dur,Math.round(t.seatCharge),Math.round(ao),Math.round(t.totalAmount),t.method];})];const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${settings.cafeName.replace(/ /g,'-')}-all.csv`;a.click();URL.revokeObjectURL(url);}
function exportPDF(date){const tx=txnsForDate(date);const rev=tx.reduce((s,t)=>s+t.totalAmount,0),seatRev=tx.reduce((s,t)=>s+t.seatCharge,0),aoRev=tx.reduce((s,t)=>s+(t.addons?t.addons.reduce((a,i)=>a+i.price*i.qty,0):0),0),guests=tx.reduce((s,t)=>s+t.persons,0);const rows=tx.map(t=>{const sl=t.seatIds.map(id=>'#'+String(id).padStart(2,'0')).join(', ');const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;return`<tr><td>${new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}–${new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</td><td>${t.name}</td><td>${t.phone||'—'}</td><td style="text-align:center">${t.persons}</td><td>${fmtMins(t.t1-t.t0)}</td><td style="text-align:right">Rs.${Math.round(t.seatCharge).toLocaleString('en-IN')}</td><td style="text-align:right">${ao?'Rs.'+Math.round(ao).toLocaleString('en-IN'):'—'}</td><td style="text-align:right"><strong>Rs.${Math.round(t.totalAmount).toLocaleString('en-IN')}</strong></td><td>${t.method.toUpperCase()}</td></tr>`;}).join('');const w=window.open('','_blank','width=900,height=700');w.document.write(`<html><head><title>Report</title><style>body{font-family:sans-serif;font-size:13px;padding:28px;max-width:1000px;margin:auto}h1{font-size:20px;margin:0 0 3px}h2{font-size:13px;color:#888;font-weight:normal;margin:0 0 18px}.stats{display:flex;gap:12px;margin-bottom:22px}.stat{border:1px solid #ddd;border-radius:8px;padding:11px 16px;text-align:center;flex:1}.sv{font-size:17px;font-weight:700}.sl{font-size:11px;color:#888;margin-top:2px}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#f5f5f5;padding:7px 8px;text-align:left;border-bottom:2px solid #ddd;font-size:10px;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #eee}tfoot td{background:#f9f9f9;font-weight:700;border-top:2px solid #ddd}.prnbtn{margin-top:20px;padding:10px 22px;background:#BA7517;color:#fff;border:none;border-radius:7px;cursor:pointer}@media print{.prnbtn{display:none}}</style></head><body><h1>${settings.cafeName}</h1><h2>Daily Report — ${new Date(date).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h2><div class="stats"><div class="stat"><div class="sv">Rs.${Math.round(rev).toLocaleString('en-IN')}</div><div class="sl">Total</div></div><div class="stat"><div class="sv">${tx.length}</div><div class="sl">Sessions</div></div><div class="stat"><div class="sv">${guests}</div><div class="sl">Guests</div></div><div class="stat"><div class="sv">Rs.${Math.round(seatRev).toLocaleString('en-IN')}</div><div class="sl">Seat Rev</div></div><div class="stat"><div class="sv">Rs.${Math.round(aoRev).toLocaleString('en-IN')}</div><div class="sl">Food Rev</div></div></div><table><thead><tr><th>Time</th><th>Customer</th><th>Phone</th><th>Persons</th><th>Duration</th><th>Seat</th><th>Food</th><th>Total</th><th>Payment</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="5">TOTAL (${tx.length} sessions)</td><td style="text-align:right">Rs.${Math.round(seatRev).toLocaleString('en-IN')}</td><td style="text-align:right">Rs.${Math.round(aoRev).toLocaleString('en-IN')}</td><td style="text-align:right">Rs.${Math.round(rev).toLocaleString('en-IN')}</td><td></td></tr></tfoot></table><button class="prnbtn" onclick="window.print()">🖨️ Print / Save PDF</button></body></html>`);w.document.close();}

// ═══ SETTINGS ═══
function renderSettings(){
  document.getElementById('content').innerHTML=`<div class="settings-wrap">
    <div class="sec-box"><div class="sec-title">Café Details</div>
      <div class="fgrp"><label class="flabel">Café name</label><input id="s-name" value="${settings.cafeName}"></div>
      <div class="fgrp"><label class="flabel">Address (on receipt)</label><input id="s-addr" value="${settings.address}" placeholder="Coimbatore..."></div>
      <div class="fgrp" style="margin-bottom:0"><label class="flabel">Rate per hour per seat (₹)</label><input id="s-rate" type="number" value="${settings.ratePerHour}" min="1"></div>
    </div>
    <div class="sec-box"><div class="sec-title">🔐 Security</div>
      <div class="fgrp"><label class="flabel">Manager PIN</label><input id="s-pin" type="password" value="${settings.pin||''}" placeholder="Enter PIN" maxlength="8"></div>
      <div class="fgrp" style="margin-bottom:0"><label class="flabel">Large bill threshold (₹)</label><input id="s-threshold" type="number" value="${settings.largeBillThreshold||500}" min="0"></div>
      <div class="hint-box" style="margin-top:10px;margin-bottom:0">Default PIN: <strong>1234</strong></div>
    </div>
    <button class="btn-pri" style="margin-top:0" onclick="saveSettings()">Save All Settings</button>
    <div class="sec-box" style="margin-top:14px"><div class="sec-title">Data</div>
      <button class="btn-sec" style="margin-top:0;border-color:#185FA5;color:#185FA5" onclick="exportAllCSV()">📊 Export All Transactions</button>
      <button class="btn-sec" style="margin-top:8px;border-color:#C0392B;color:#C0392B" onclick="requirePIN('Clear All Data',confirmClearData)">⚠ Clear All Data</button>
    </div>
    <div class="hint-box" style="margin-top:12px"><strong>The Playhouse Billing v3.1</strong><br>Firebase · Auto ID · WhatsApp · Persons Edit · Edit Timer · Nav Lock<br>Total transactions: <strong>${txns.length}</strong></div>
  </div>`;
}
function saveSettings(){settings.cafeName=document.getElementById('s-name').value.trim()||'The Playhouse';settings.address=document.getElementById('s-addr').value.trim();settings.ratePerHour=parseFloat(document.getElementById('s-rate').value)||99;settings.pin=document.getElementById('s-pin').value;settings.largeBillThreshold=parseFloat(document.getElementById('s-threshold').value)||500;saveAll();renderStats();const btn=event.target;btn.textContent='✓ Saved!';btn.style.background='#27AE60';setTimeout(()=>{btn.textContent='Save All Settings';btn.style.background='';},1800);}
function confirmClearData(){showModal(`<h3>⚠ Clear All Data?</h3><div class="warn-box">Permanently deletes ALL ${txns.length} transactions. Cannot be undone.</div><button class="btn-sec" style="border-color:#185FA5;color:#185FA5;margin-top:0" onclick="exportAllCSV()">📊 Export First</button><button class="btn-pri red" onclick="doClearData()">Delete Everything</button><button class="btn-sec" onclick="closeModal()">Cancel</button>`);}
function doClearData(){seats=mkSeats();txns=[];groupColorMap={};gcIdx=0;coInfo=null;cartItems={};customerCounter=1;saveAll();renderStats();closeModal();if(currentView==='settings')renderSettings();else renderFloor();}

// ═══ NAV ═══
function setView(v){
  if(_receiptActive){showNavLockToast();return;}
  if(v==='settings'){requirePIN('Access Settings',()=>doSetView('settings'));return;}
  doSetView(v);
}
function doSetView(v){currentView=v;['floor','menu','report','settings'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===v));if(v==='floor')renderFloor();else if(v==='menu')renderMenu();else if(v==='report')renderReport();else if(v==='settings')renderSettings();}
function showModal(html){const ov=document.getElementById('overlay');ov.innerHTML=`<div class="mbox">${html}</div>`;ov.style.display='flex';}
function closeModal(){
  if(_receiptActive)return;
  document.getElementById('overlay').style.display='none';
  if(window._coIv){clearInterval(window._coIv);window._coIv=null;}
  _pinActive=false;
}

setInterval(()=>{tickUpdate();if(currentView==='report')renderReport();},1000);
setTimeout(()=>{checkExportBanner();},1500);

async function startApp(){await loadAll();renderStats();renderFloor();checkExportBanner();}
startApp();
</script>
</body>
</html>
