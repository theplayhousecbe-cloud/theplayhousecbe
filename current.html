<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Playhouse — Billing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7;
  --bg2:#ffffff;
  --bg3:#f9fafb;
  --bg4:#f0f1f3;
  --border:#e2e4e9;
  --border2:#c8ccd6;
  --text:#111827;
  --text2:#4b5563;
  --text3:#9ca3af;
  --gold:#BA7517;
  --gold2:#8a5510;
  --gold-glow:rgba(186,117,23,0.12);
  --green:#16a34a;
  --green-bg:rgba(22,163,74,0.1);
  --amber:#b45309;
  --amber-bg:rgba(180,83,9,0.08);
  --blue:#1d4ed8;
  --blue-bg:rgba(29,78,216,0.08);
  --red:#dc2626;
  --red-bg:rgba(220,38,38,0.08);
  --seat-free-bg:#EAF3DE;
  --seat-free-border:#3B6D11;
  --seat-free-text:#1a4a08;
  --seat-occ-bg:#FEF3C7;
  --seat-occ-border:#BA7517;
  --seat-occ-text:#78350f;
  --seat-blk-bg:#EFF6FF;
  --seat-blk-border:#1d4ed8;
  --seat-blk-text:#1e3a8a;
  --sidebar-w:56px;
  --hdr-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh}
.hdr{height:var(--hdr-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0}
.main{flex:1;overflow-y:auto;background:var(--bg)}

/* ── HEADER ── */
.hdr-brand{display:flex;align-items:center;gap:8px;margin-right:10px}
.hdr-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 14px var(--gold-glow)}
.hdr-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px;white-space:nowrap}
.hdr-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}
.hdr-stats{display:flex;gap:6px;flex:1;overflow:hidden}
.hstat{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;white-space:nowrap}
.hstat-icon{font-size:13px;opacity:.7}
.hstat-val{font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.hstat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.hdr-nav{display:flex;gap:4px;flex-shrink:0}
.hnbtn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);font-family:inherit;white-space:nowrap;transition:all .15s;letter-spacing:.3px}
.hnbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.hnbtn.active{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:700;box-shadow:0 2px 8px var(--gold-glow)}
.hnbtn.nav-locked{opacity:.3;cursor:not-allowed}
.reset-btn{padding:6px 10px;border-radius:7px;border:1px solid rgba(239,68,68,0.3);background:transparent;cursor:pointer;font-size:11px;color:var(--red);font-family:inherit;white-space:nowrap;font-weight:600;transition:all .15s}
.reset-btn:hover{background:var(--red-bg);border-color:var(--red)}
.reset-btn.nav-locked{opacity:.3;cursor:not-allowed;pointer-events:none}

/* ── SIDEBAR ── */
.sbtn{width:40px;height:40px;border-radius:10px;border:1px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text3);transition:all .15s;position:relative}
.sbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.sbtn.active{background:var(--gold-glow);color:var(--gold);border-color:rgba(240,165,0,.3)}
.sbtn-tip{position:absolute;left:52px;background:var(--bg4);color:var(--text);font-size:11px;font-weight:500;padding:4px 8px;border-radius:6px;white-space:nowrap;border:1px solid var(--border2);pointer-events:none;opacity:0;transition:opacity .15s;z-index:100}
.sbtn:hover .sbtn-tip{opacity:1}

/* ── EXPORT BANNER ── */
.exp-banner{background:linear-gradient(90deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border-bottom:1px solid rgba(245,158,11,.25);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.exp-banner-txt{font-size:11px;color:var(--amber);font-weight:500}
.exp-banner-btns{display:flex;gap:6px}
.exp-banner-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:10px;cursor:pointer;font-family:inherit;font-weight:600}
.exp-banner-btn.pri{background:var(--gold);color:#fff}
.exp-banner-btn.dim{border-color:var(--border2);color:var(--text3)}

/* ── FLOOR ── */
.floor-wrap{padding:12px}
.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ldot{width:10px;height:10px;border-radius:3px;border:1.5px solid}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}
.seat{border-radius:10px;padding:10px 6px;cursor:pointer;border:1.5px solid;text-align:center;transition:all .15s;user-select:none;position:relative;backdrop-filter:blur(4px)}
.seat:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.seat:active{transform:scale(.96)}
.seat.free{background:var(--seat-free-bg);border-color:var(--seat-free-border)}
.seat.occ{background:var(--seat-occ-bg);border-color:var(--seat-occ-border)}
.seat.blk{background:var(--seat-blk-bg);border-color:var(--seat-blk-border)}
.sn{font-size:12px;font-weight:700;letter-spacing:.3px}
.seat.free .sn{color:var(--seat-free-text)}
.seat.occ .sn{color:var(--seat-occ-text)}
.seat.blk .sn{color:var(--seat-blk-text)}
.s-lbl{font-size:9px;margin-top:3px;color:var(--seat-free-text);opacity:.6;letter-spacing:.05em;text-transform:uppercase}
.s-lbl-blk{font-size:9px;margin-top:3px;color:var(--seat-blk-text);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.s-tim{font-size:10px;margin-top:3px;color:var(--seat-occ-text);font-weight:600;font-variant-numeric:tabular-nums}
.s-grp{font-size:9px;margin-top:2px;color:var(--text3)}
.grp-dot{width:6px;height:6px;border-radius:50%;position:absolute;top:5px;right:5px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:16px;overflow-y:auto;backdrop-filter:blur(3px)}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:22px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.15);margin:auto;flex-shrink:0}
.mbox h3{font-size:15px;font-weight:600;margin:0 0 16px;color:var(--text)}
.flabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block;font-weight:500}
.fgrp{margin-bottom:12px}
.fgrp input,.fgrp select{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border .15s}
.fgrp input:focus,.fgrp select:focus{border-color:var(--gold);background:var(--bg4)}
.fgrp select option{background:var(--bg3)}
.counter{display:flex;align-items:center;gap:8px}
.cbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cbtn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.cval{font-size:20px;font-weight:700;min-width:28px;text-align:center;color:var(--text);font-variant-numeric:tabular-nums}
.pay-row{display:flex;gap:6px}
.pbtn{flex:1;padding:9px 0;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;font-weight:500;transition:all .15s}
.pbtn:hover{border-color:var(--gold);color:var(--gold)}
.pbtn.sel{border-color:var(--gold);background:var(--gold-glow);color:var(--gold);font-weight:700}
.btn-pri{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:9px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:7px;transition:all .15s;letter-spacing:.2px}
.btn-pri:hover{box-shadow:0 4px 20px var(--gold-glow);transform:translateY(-1px)}
.btn-pri.red{background:linear-gradient(135deg,#ef4444,#c0392b)}.btn-pri.red:hover{box-shadow:0 4px 20px rgba(239,68,68,.3)}
.btn-pri.blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}.btn-pri.blue:hover{box-shadow:0 4px 20px rgba(59,130,246,.3)}
.btn-pri.grn{background:linear-gradient(135deg,#22c55e,#16a34a)}.btn-pri.grn:hover{box-shadow:0 4px 20px rgba(34,197,94,.3)}
.btn-pri.whatsapp{background:linear-gradient(135deg,#25D366,#1aaa50)}
.btn-sec{width:100%;padding:9px;background:transparent;border:1px solid var(--border2);border-radius:9px;color:var(--text3);font-family:inherit;font-size:12px;cursor:pointer;margin-top:6px;transition:all .15s}
.btn-sec:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.bill-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.brow{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none}
.brow .lbl{color:var(--text3)}.brow .val{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums}
.btotal{font-size:26px;font-weight:800;color:var(--gold);text-align:center;padding:6px 0;font-variant-numeric:tabular-nums}
.hint-box{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);border-radius:8px;padding:8px 11px;font-size:11px;color:var(--amber);margin-bottom:8px;line-height:1.6}
.warn-box{background:var(--red-bg);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:8px 11px;font-size:11px;color:#b91c1c;margin-bottom:8px}
.sec-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.sec-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;margin-top:3px;display:inline-block;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.tag.cash{background:var(--green-bg);color:#15803d}
.tag.upi{background:rgba(139,92,246,.15);color:#6d28d9}
.tag.card{background:var(--blue-bg);color:#1d4ed8}
.btn-row{display:flex;gap:7px;margin-top:7px}
.add-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.add-row:last-child{border-bottom:none}

/* ── REPORT ── */
.rpt{padding:14px}
.date-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.dpill{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.dpill:hover{border-color:var(--border2);color:var(--text2)}
.dpill.active{border-color:var(--gold);background:var(--gold-glow);color:var(--gold);font-weight:600}
.rpt-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
.rstat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.rstat-v{font-size:16px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.rstat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.sec-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;margin-top:2px;font-weight:500}
.exp-btns{display:flex;gap:7px;margin-bottom:12px}
.exp-btn{flex:1;padding:9px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);font-size:11px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;font-weight:500}
.exp-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.pay-bkdn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.pbrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.pbrow:last-child{border-bottom:none}
.tx-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;transition:border .15s}
.tx-item:hover{border-color:var(--border2)}
.tx-seat{font-size:10px;color:var(--text3)}.tx-name{font-size:13px;font-weight:600;color:var(--text)}.tx-time{font-size:10px;color:var(--text3);margin-top:1px}
.tx-amt{font-size:14px;font-weight:700;text-align:right;color:var(--gold);font-variant-numeric:tabular-nums}
.tx-print{padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;font-size:10px;cursor:pointer;color:var(--text3);margin-top:4px;display:block;width:100%;font-family:inherit;transition:all .15s}
.tx-print:hover{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;color:var(--text3);padding:40px;font-size:13px}

/* ── MENU ── */
.menu-item-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;transition:border .15s}
.menu-item-row:hover{border-color:var(--border2)}
.mi-btn{padding:4px 10px;border-radius:6px;border:1px solid;font-size:11px;cursor:pointer;font-family:inherit;background:transparent;transition:all .15s}

/* ── SETTINGS ── */
.settings-wrap{padding:14px;max-width:500px}
.reset-inputs{display:flex;gap:10px;margin-bottom:14px}
.reset-field{flex:1;text-align:center}
.reset-field label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.reset-field input{width:100%;padding:10px;border-radius:8px;border:2px solid var(--border2);background:var(--bg3);color:var(--text);font-size:22px;font-weight:700;text-align:center;outline:none}
.reset-field input:focus{border-color:var(--red)}
.reset-preview{background:var(--red-bg);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 14px;margin-bottom:12px;text-align:center}
.reset-preview-count{font-size:32px;font-weight:700;color:var(--red);font-variant-numeric:tabular-nums}
.reset-preview-label{font-size:11px;color:#fca5a5;margin-top:3px}
.reset-preview-range{font-size:10px;color:var(--text3);margin-top:4px}

/* ── PHONE BOX ── */
.phone-box{background:rgba(59,130,246,.07);border:1.5px solid rgba(59,130,246,.25);border-radius:9px;padding:10px 12px;margin-bottom:12px}
.phone-box .flabel{color:var(--blue)}
.phone-box input{background:var(--bg3);border-color:rgba(59,130,246,.3);font-size:15px;padding:9px 11px;letter-spacing:.05em;color:var(--text)}

/* ── BIG BILL ── */
.big-bill{text-align:center;padding:16px 0}
.big-bill-amt{font-size:48px;font-weight:800;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums}
.big-bill-lbl{font-size:12px;color:var(--text3);margin-top:7px}

/* ── TOAST ── */
.nav-lock-toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(239,68,68,.4);opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:.3px}
.nav-lock-toast.show{opacity:1}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">🎲</div>
      <div>
        <div class="hdr-name" id="hdr-cafe-name">THE PLAYHOUSE</div>
      </div>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-stats" id="stats"></div>
    <div class="hdr-nav">
      <button class="hnbtn active" onclick="setView('floor')" id="btn-floor">Floor</button>
      <button class="hnbtn" onclick="setView('menu')" id="btn-menu">Menu</button>
      <button class="hnbtn" onclick="setView('report')" id="btn-report">Report</button>
      <button class="hnbtn" onclick="setView('settings')" id="btn-settings">⚙</button>
      <button class="reset-btn" onclick="openReset()">🗑</button>
    </div>
  </div>

  <div id="export-banner" style="display:none"></div>

  <!-- BODY -->
  <div class="body">
    <div class="main" id="content"></div>
  </div>
</div>

<div class="nav-lock-toast" id="nav-lock-toast">⚠ Press Done before switching screens</div>
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this&&!_pinActive&&!_receiptActive)closeModal()"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBaocyc92pXMmmNx_foVZvZSYX3L8NYuTU",authDomain:"the-playhouse-cafe.firebaseapp.com",projectId:"the-playhouse-cafe",storageBucket:"the-playhouse-cafe.firebasestorage.app",messagingSenderId:"321873657191",appId:"1:321873657191:web:feababb0723ca3ef2a03c2"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();window.db=db;

const TOTAL_SEATS=48;
const GRP_COLORS=['#f59e0b','#3b82f6','#22c55e','#a855f7','#ef4444','#14b8a6','#f97316','#06b6d4','#eab308','#6b7280'];
const MENU_CATS=['Hot Drinks','Cold Drinks','Food','Snacks','Desserts','Other'];
const DEFAULT_MENU=[
  {id:'m01',name:'Filter Coffee',price:30,category:'Hot Drinks'},{id:'m02',name:'Masala Chai',price:25,category:'Hot Drinks'},{id:'m03',name:'Green Tea',price:20,category:'Hot Drinks'},
  {id:'m04',name:'Cold Coffee',price:60,category:'Cold Drinks'},{id:'m05',name:'Fresh Lime Soda',price:40,category:'Cold Drinks'},{id:'m06',name:'Lassi',price:50,category:'Cold Drinks'},
  {id:'m07',name:'Idli Sambar',price:60,category:'Food'},{id:'m08',name:'Masala Dosa',price:80,category:'Food'},{id:'m09',name:'Sandwich',price:70,category:'Food'},
  {id:'m10',name:'Samosa',price:20,category:'Snacks'},{id:'m11',name:'Vada',price:30,category:'Snacks'},{id:'m12',name:'Banana Cake',price:40,category:'Desserts'},
];

let settings={cafeName:'THE PLAYHOUSE',address:'',ratePerHour:99,pin:'1234',lastExportDate:'',largeBillThreshold:500};
let seats=mkSeats(),txns=[],menuItems=JSON.parse(JSON.stringify(DEFAULT_MENU));
let groupColorMap={},gcIdx=0,currentView='floor',selectedMethod='cash';
let cartItems={},coInfo=null,reportDate=todayStr();
let _pinCallback=null,_pinValue='',_pinActive=false,_lastDateStr=todayStr();
let customerCounter=1,_receiptActive=false;

function mkSeats(){return Array.from({length:TOTAL_SEATS},(_,i)=>({id:i+1,occupied:false,name:'',t0:null,groupId:null,groupSize:0,blocked:false,blockInfo:null}));}
async function saveAll(){await db.collection("playhouse").doc("data").set({settings,seats,txns,menuItems,customerCounter});}
async function loadAll(){
  const doc=await db.collection("playhouse").doc("data").get();
  if(doc.exists){const d=doc.data();settings=d.settings||settings;seats=d.seats||seats;txns=d.txns||txns;menuItems=d.menuItems||menuItems;customerCounter=d.customerCounter||1;}
  if(settings.cafeName==='My Café'||settings.cafeName==='My Cafe'||settings.cafeName==='The Playhouse')settings.cafeName='THE PLAYHOUSE';
}

function getGrpColor(gid){if(!groupColorMap[gid]){groupColorMap[gid]=GRP_COLORS[gcIdx%GRP_COLORS.length];gcIdx++;}return groupColorMap[gid];}
function calcSeatCharge(t0,persons){const mins=(Date.now()-t0)/60000,r=settings.ratePerHour;return mins<=60?r*persons:Math.ceil((r+(r/60)*(mins-60))*persons);}
function calcCartTotal(){return Object.entries(cartItems).reduce((s,[id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?s+it.price*qty:s;},0);}
function getCartAddons(){return Object.entries(cartItems).map(([id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?{name:it.name,price:it.price,qty}:null;}).filter(Boolean);}
function fmtDur(t0){const s=Math.floor((Date.now()-t0)/1000);return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');}
function fmtMins(ms){const m=Math.floor(ms/60000);return(Math.floor(m/60)>0?Math.floor(m/60)+'h ':'')+m%60+'m';}
function inr(n){return '₹'+Math.round(n).toLocaleString('en-IN');}
function todayStr(){return new Date().toDateString();}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toDateString();}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return '—';const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function allDates(){const dates=[...new Set(txns.map(t=>t.date))].sort((a,b)=>new Date(b)-new Date(a));if(!dates.includes(todayStr()))dates.unshift(todayStr());return dates;}
function txnsForDate(d){return txns.filter(t=>t.date===d);}

// ═══ PIN ═══
function requirePIN(title,callback){
  if(!settings.pin){callback();return;}
  _pinCallback=callback;_pinValue='';_pinActive=true;
  showModal(pinModalHTML(title,''));
  document.removeEventListener('keydown',_pinKeyHandler);
  document.addEventListener('keydown',_pinKeyHandler);
}
function _pinKeyHandler(e){
  if(!_pinActive)return;
  if(e.key>='0'&&e.key<='9'){e.preventDefault();pinKey(e.key);}
  else if(e.key==='Backspace'){e.preventDefault();pinDel();}
  else if(e.key==='Enter'){e.preventDefault();pinSubmit();}
  else if(e.key==='Escape'){e.preventDefault();pinCancel();}
}
function pinDots(){
  return Array.from({length:4},(_,i)=>`<div style="width:13px;height:13px;border-radius:50%;border:2px solid ${i<_pinValue.length?'#f0a500':'rgba(255,255,255,0.2)'};background:${i<_pinValue.length?'#f0a500':'transparent'};transition:all .18s;box-shadow:${i<_pinValue.length?'0 0 10px rgba(240,165,0,.5)':'none'}"></div>`).join('');
}
function pinModalHTML(title,err){

  return `<div style="margin:-22px;padding:26px 22px 22px;background:linear-gradient(160deg,#0d0f1a 0%,#131a2e 50%,#0f2040 100%);border-radius:16px;color:#e8eaf0">
    <div style="text-align:center;margin-bottom:4px">
      <div style="width:46px;height:46px;background:linear-gradient(135deg,#f0a500,#c47d00);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;box-shadow:0 6px 20px rgba(240,165,0,.3)">🔐</div>
      <div style="font-size:15px;font-weight:600;letter-spacing:.3px">${title}</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase">Manager PIN Required</div>
    </div>
    <div data-dots style="display:flex;justify-content:center;gap:14px;margin:20px 0 18px">${pinDots()}</div>
    ${err?`<div style="text-align:center;color:#fca5a5;font-size:12px;margin-bottom:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:7px;padding:7px">${err}</div>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:9px">${keys}
      <button onclick="pinDel()" style="height:56px;border-radius:11px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;transition:all .12s" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.04)'" onmousedown="this.style.transform='scale(0.92)'" onmouseup="this.style.transform='scale(1)'">⌫</button>
      <button onclick="pinKey('0')" style="height:56px;border-radius:11px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#e8eaf0;font-size:22px;font-weight:300;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s" onmouseover="this.style.background='rgba(240,165,0,0.15)';this.style.borderColor='rgba(240,165,0,0.4)'" onmouseout="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.08)'" onmousedown="this.style.transform='scale(0.92)'" onmouseup="this.style.transform='scale(1)'">0</button>
      <button onclick="pinSubmit()" style="height:56px;border-radius:11px;border:none;background:linear-gradient(135deg,#f0a500,#c47d00);color:#000;font-size:22px;font-weight:700;cursor:pointer;transition:all .12s;box-shadow:0 4px 16px rgba(240,165,0,.3)" onmouseover="this.style.boxShadow='0 6px 24px rgba(240,165,0,.5)'" onmouseout="this.style.boxShadow='0 4px 16px rgba(240,165,0,.3)'" onmousedown="this.style.transform='scale(0.92)'" onmouseup="this.style.transform='scale(1)'">✓</button>

}
function refreshPinDots(){
  const ov=document.getElementById('overlay');
  const dc=ov&&ov.querySelector('[data-dots]');
  if(dc)dc.innerHTML=pinDots();
}
function pinKey(d){if(_pinValue.length>=4)return;_pinValue+=d;refreshPinDots();if(_pinValue.length>=4)setTimeout(pinSubmit,160);}
function pinDel(){_pinValue=_pinValue.slice(0,-1);refreshPinDots();}
function pinSubmit(){
  if(_pinValue===settings.pin){const cb=_pinCallback;_pinCallback=null;_pinActive=false;_pinValue='';document.removeEventListener('keydown',_pinKeyHandler);closeModal();cb();}
  else{_pinValue='';const ov=document.getElementById('overlay');if(ov)ov.querySelector('.mbox').innerHTML=pinModalHTML('Wrong PIN','❌  Incorrect PIN — try again');}
}
function pinCancel(){_pinCallback=null;_pinActive=false;_pinValue='';document.removeEventListener('keydown',_pinKeyHandler);closeModal();}

let _resetCutoff=0;
function openReset(){if(_receiptActive){showNavLockToast();return;}requirePIN('Reset Data',showResetModal);}
function showResetModal(){
  const rsvCount=seats.filter(s=>s.blocked).length;
  showModal(`<h3 style="color:var(--red)">🗑 Reset Data</h3>
    <p style="font-size:12px;color:var(--text3);margin:-8px 0 16px;line-height:1.6">Delete transactions by time range.</p>
    <div class="reset-inputs">
      <div class="reset-field"><label>Days</label><input type="number" id="reset-days" min="0" max="365" value="0" oninput="updateResetPreview()"></div>
      <div style="display:flex;align-items:center;padding-top:22px;color:var(--text3);font-size:22px">+</div>
      <div class="reset-field"><label>Hours</label><input type="number" id="reset-hours" min="0" max="23" value="0" oninput="updateResetPreview()"></div>
    </div>
    <div class="reset-preview"><div class="reset-preview-count" id="reset-count">0</div><div class="reset-preview-label" id="reset-label">Enter days or hours above</div><div class="reset-preview-range" id="reset-range"></div></div>
    ${rsvCount>0?`<div class="hint-box">⚠ <strong>${rsvCount} reservation${rsvCount>1?'s':''}</strong> active — can clear too.</div>`:''}
    <div class="warn-box">⚠ Permanently deletes from Firebase.</div>
    <button class="btn-sec" style="border-color:var(--blue);color:var(--blue);margin-top:0" onclick="exportAllCSV()">📊 Export Backup First</button>
    <button class="btn-pri red" id="reset-confirm-btn" onclick="confirmReset()" disabled style="opacity:.4;cursor:not-allowed">🗑 Proceed</button>
    ${rsvCount>0?`<button class="btn-pri blue" style="margin-top:6px" onclick="confirmClearReservationsOnly()">🔒 Clear Reservations Only</button>`:''}
    <button class="btn-sec" onclick="closeModal()">Cancel</button>`);
  setTimeout(updateResetPreview,30);
}
function updateResetPreview(){
  const days=parseInt(document.getElementById('reset-days')?.value)||0,hours=parseInt(document.getElementById('reset-hours')?.value)||0;
  const totalMs=(days*24+hours)*60*60*1000;_resetCutoff=Date.now()-totalMs;
  const toDelete=txns.filter(t=>t.t1>=_resetCutoff);
  const countEl=document.getElementById('reset-count'),labelEl=document.getElementById('reset-label'),rangeEl=document.getElementById('reset-range'),btnEl=document.getElementById('reset-confirm-btn');
  if(countEl)countEl.textContent=toDelete.length;
  if(labelEl){if(days===0&&hours===0){labelEl.textContent='Enter days or hours above';}else{const ts=(days>0?days+' day'+(days>1?'s':''):'')+(days>0&&hours>0?' + ':'')+(hours>0?hours+' hour'+(hours>1?'s':''):'');labelEl.textContent='transaction'+(toDelete.length!==1?'s':'')+' from last '+ts+' deleted';}}
  if(rangeEl&&totalMs>0){rangeEl.textContent='From '+new Date(_resetCutoff).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+' → Now';}else if(rangeEl){rangeEl.textContent='';}
  if(btnEl){const can=totalMs>0&&toDelete.length>0;btnEl.disabled=!can;btnEl.style.opacity=can?'1':'0.4';btnEl.style.cursor=can?'pointer':'not-allowed';btnEl.textContent='🗑 Delete '+toDelete.length+' Transaction'+(toDelete.length!==1?'s':'');}
}
function confirmReset(){
  const toDelete=txns.filter(t=>t.t1>=_resetCutoff);if(!toDelete.length){alert('No transactions.');return;}
  const rsvCount=seats.filter(s=>s.blocked).length;
  const fromStr=new Date(_resetCutoff).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  let html=`<h3 style="text-align:center;color:var(--red)">⚠ Confirm Delete</h3><div style="text-align:center;margin:14px 0"><div style="font-size:52px;font-weight:700;color:var(--red);line-height:1;font-variant-numeric:tabular-nums">${toDelete.length}</div><div style="font-size:13px;color:var(--text2);margin-top:8px">transaction${toDelete.length!==1?'s':''} permanently deleted</div><div style="font-size:10px;color:var(--text3);background:var(--bg3);border-radius:6px;padding:5px 10px;display:inline-block;margin-top:7px">From ${fromStr} → Now</div></div><div class="warn-box" style="text-align:center">Cannot be undone.</div>`;
  if(rsvCount>0){html+=`<button class="btn-pri red" style="margin-top:0" onclick="doResetTxns();confirmClearReservationsOnly()">🗑 Delete + Clear ${rsvCount} Reservation${rsvCount>1?'s':''}</button><button class="btn-sec" style="border-color:var(--red);color:var(--red);margin-top:6px" onclick="doResetTxns()">Delete Transactions Only</button>`;}
  else{html+=`<button class="btn-pri red" style="margin-top:0" onclick="doResetTxns()">Yes — Delete</button>`;}
  html+=`<button class="btn-sec" onclick="showResetModal()">← Go Back</button>`;
  showModal(html);
}
function confirmClearReservationsOnly(){
  const rsvCount=seats.filter(s=>s.blocked).length;
  if(!rsvCount){showModal('<h3>No Reservations</h3><p style="color:var(--text3);font-size:13px">No active reservations.</p><button class="btn-sec" onclick="closeModal()">OK</button>');return;}
  let rsvList='';
  seats.filter(s=>s.blocked).forEach(s=>{const bi=s.blockInfo||{};const dateStr=bi.date?new Date(bi.date+'T00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';rsvList+=`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border)"><span style="font-weight:500">${bi.name||'—'}</span><span style="color:var(--blue)">${dateStr}${bi.time?' '+bi.time:''}</span></div>`;});
  showModal(`<h3 style="text-align:center;color:var(--blue)">🔒 Clear All Reservations?</h3><div style="text-align:center;margin:10px 0 14px"><div style="font-size:52px;font-weight:700;color:var(--blue);line-height:1">${rsvCount}</div><div style="font-size:13px;color:var(--text2);margin-top:6px">reservation${rsvCount!==1?'s':''} removed</div></div><div style="max-height:160px;overflow-y:auto;background:var(--bg3);border-radius:8px;padding:8px 12px;margin-bottom:12px">${rsvList}</div><div class="warn-box" style="text-align:center">Reserved seats become <strong>free</strong>. Cannot be undone.</div><button class="btn-pri blue" style="margin-top:0" onclick="doClearReservations()">Yes — Clear All</button><button class="btn-sec" onclick="closeModal()">Keep Reservations</button>`);
}
function doResetTxns(){const before=txns.length;txns=txns.filter(t=>t.t1<_resetCutoff);const deleted=before-txns.length;saveAll();renderStats();if(currentView==='report')renderReport();else if(currentView==='floor')renderFloor();showModal(`<div style="text-align:center;padding:14px 0"><div style="font-size:48px;margin-bottom:10px">✅</div><h3>Deleted</h3><p style="font-size:13px;color:var(--text3);margin-top:10px;line-height:1.8"><span style="font-size:26px;font-weight:700;color:var(--red);display:block;font-variant-numeric:tabular-nums">${deleted}</span>transaction${deleted!==1?'s':''} deleted.<br><strong style="color:var(--text)">${txns.length}</strong> remaining.</p></div><button class="btn-pri grn" onclick="closeModal()">Done</button>`);}
function doClearReservations(){const n=seats.filter(s=>s.blocked).length;seats=seats.map(s=>s.blocked?{...s,blocked:false,blockInfo:null}:s);saveAll();renderStats();if(currentView==='floor')renderFloor();showModal(`<div style="text-align:center;padding:14px 0"><div style="font-size:48px;margin-bottom:10px">✅</div><h3>Reservations Cleared</h3><p style="font-size:13px;color:var(--text3);margin-top:10px"><span style="font-size:26px;font-weight:700;color:var(--blue);display:block">${n}</span>reservations removed.</p></div><button class="btn-pri grn" onclick="closeModal()">Done</button>`);}

function chgP(d){const el=document.getElementById('ci-p');const n=Math.max(1,parseInt(el.textContent)+d);el.textContent=n;const avail=seats.filter(s=>!s.occupied&&!s.blocked).length;const w=document.getElementById('ci-warn');if(w)w.innerHTML=n>avail?`<div class="warn-box">Only ${avail} free seats!</div>`:'';}
function doCheckin(startId){

function chgEsP(d){const el=document.getElementById('es-p');const cur=parseInt(el.textContent);const avail=seats.filter(s=>!s.occupied&&!s.blocked).length;const newVal=Math.max(1,cur+d);if(d>0&&avail<1){const h=document.getElementById('es-p-hint');if(h)h.textContent='⚠ No free seats';return;}el.textContent=newVal;const h=document.getElementById('es-p-hint');if(h){if(newVal<cur)h.textContent=`← frees ${cur-newVal} seat(s)`;else if(newVal>cur)h.textContent=`← uses ${newVal-cur} free seat(s)`;else h.textContent='';}}
function doEditSession(gid){
  const name=document.getElementById('es-name').value.trim();
  const esDate=document.getElementById('es-date')?.value,esTime=document.getElementById('es-time')?.value;

  const newPersons=parseInt(document.getElementById('es-p')?.textContent)||0;
  if(newT0&&newT0>Date.now()){alert('Start time cannot be in the future.');return;}
  const grp=seats.filter(s=>s.groupId===gid),currentPersons=grp.length;
  if(newPersons<currentPersons){const toFree=grp.slice(newPersons).map(s=>s.id);seats=seats.map(s=>{if(s.groupId===gid&&toFree.includes(s.id))return{...s,occupied:false,name:'',t0:null,groupId:null,groupSize:0};if(s.groupId===gid)return{...s,name:name||s.name,groupSize:newPersons,...(newT0?{t0:newT0}:{})};return s;});}
  else if(newPersons>currentPersons){const needed=newPersons-currentPersons,refId=grp[grp.length-1].id;const free=seats.filter(s=>!s.occupied&&!s.blocked).sort((a,b)=>{const ai=a.id>refId?a.id-refId:a.id+TOTAL_SEATS,bi=b.id>refId?b.id-refId:b.id+TOTAL_SEATS;return ai-bi;});if(free.length<needed){alert(`Only ${free.length} free seat(s).`);return;}const toOcc=free.slice(0,needed).map(s=>s.id),t0use=newT0||grp[0].t0;seats=seats.map(s=>{if(toOcc.includes(s.id))return{...s,occupied:true,name:name||grp[0].name,t0:t0use,groupId:gid,groupSize:newPersons};if(s.groupId===gid)return{...s,name:name||s.name,groupSize:newPersons,...(newT0?{t0:newT0}:{})};return s;});}
  else{seats=seats.map(s=>s.groupId===gid?{...s,name:name||s.name,...(newT0&&newT0>0?{t0:newT0}:{})}:s);}
  if(coInfo&&coInfo.gid===gid){coInfo.persons=newPersons;if(newT0)coInfo.t0=newT0;}
  saveAll();closeModal();if(currentView==='floor')renderFloor();
}
function confirmCancelSession(gid){const grp=seats.filter(s=>s.groupId===gid),s0=grp[0];showModal(`<h3>Cancel Session?</h3><div class="warn-box">⚠ Frees all ${s0.groupSize} seat(s) with NO charge.</div><button class="btn-pri red" style="margin-top:0" onclick="doCancelSession('${gid}')">Yes — No Charge</button><button class="btn-sec" onclick="openCheckout('${gid}')">← Back to Checkout</button>`);}

    ['cash','upi','card'].forEach(m=>{const mt=tx.filter(t=>t.method===m);if(!mt.length)return;html+=`<div class="pbrow"><span style="font-weight:600;font-size:12px;text-transform:uppercase;color:var(--text)">${m}</span><span style="color:var(--text3);font-size:11px">${mt.length} session${mt.length>1?'s':''}</span><span style="font-weight:600;font-size:12px;color:var(--gold);font-variant-numeric:tabular-nums">${inr(mt.reduce((s,t)=>s+t.totalAmount,0))}</span></div>`;});
    html+=`</div><div class="sec-lbl">Transactions</div>`;
    tx.forEach(t=>{const sl=t.seatIds.map(id=>'#'+String(id).padStart(2,'0')).join(', ');const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;html+=`<div class="tx-item"><div style="flex:1;min-width:0"><div class="tx-seat">Seats ${sl} · ${t.persons}p · ${fmtMins(t.t1-t.t0)}</div><div class="tx-name">${t.name}</div><div class="tx-time">${new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})} → ${new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>${ao>0?`<div class="tx-time" style="color:var(--gold)">Food: ${inr(ao)}</div>`:''}${t.phone?`<div class="tx-time">📱 ${t.phone} <button onclick="sendWhatsApp(${t.id})" style="border:1px solid #25D366;background:transparent;color:#25D366;border-radius:4px;font-size:10px;cursor:pointer;padding:1px 6px;margin-left:4px">WA</button></div>`:''}</div><div style="text-align:right;flex-shrink:0;margin-left:10px"><div class="tx-amt">${inr(t.totalAmount)}</div><span class="tag ${t.method}">${t.method.toUpperCase()}</span><button class="tx-print" onclick="printR(${t.id})">🖨️ Reprint</button></div></div>`;});
  }else{html+=`<div class="empty">No transactions on this date.</div>`;}
  html+='</div>';document.getElementById('content').innerHTML=html;
}

// ═══ EXPORT ═══
function exportCSV(date){const tx=txnsForDate(date);const rows=[['Date','Customer','Phone','Persons','Seats','Check-in','Check-out','Duration(min)','Seat Charge','Food','Total','Payment'],...tx.map(t=>{const sl=t.seatIds.join(' ');const dur=Math.floor((t.t1-t.t0)/60000);const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;return[t.date,`"${t.name}"`,t.phone||'',t.persons,`"${sl}"`,new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),dur,Math.round(t.seatCharge),Math.round(ao),Math.round(t.totalAmount),t.method];})];const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${settings.cafeName.replace(/ /g,'-')}-${date.replace(/ /g,'-')}.csv`;a.click();URL.revokeObjectURL(url);}
function exportAllCSV(){const rows=[['Date','Customer','Phone','Persons','Seats','Check-in','Check-out','Duration(min)','Seat Charge','Food','Total','Payment'],...txns.map(t=>{const sl=t.seatIds.join(' ');const dur=Math.floor((t.t1-t.t0)/60000);const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;return[t.date,`"${t.name}"`,t.phone||'',t.persons,`"${sl}"`,new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),dur,Math.round(t.seatCharge),Math.round(ao),Math.round(t.totalAmount),t.method];})];const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${settings.cafeName.replace(/ /g,'-')}-all.csv`;a.click();URL.revokeObjectURL(url);}
function exportPDF(date){const tx=txnsForDate(date);const rev=tx.reduce((s,t)=>s+t.totalAmount,0),seatRev=tx.reduce((s,t)=>s+t.seatCharge,0),aoRev=tx.reduce((s,t)=>s+(t.addons?t.addons.reduce((a,i)=>a+i.price*i.qty,0):0),0),guests=tx.reduce((s,t)=>s+t.persons,0);const rows=tx.map(t=>{const sl=t.seatIds.map(id=>'#'+String(id).padStart(2,'0')).join(', ');const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;return`<tr><td>${new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}–${new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</td><td>${t.name}</td><td>${t.phone||'—'}</td><td style="text-align:center">${t.persons}</td><td>${fmtMins(t.t1-t.t0)}</td><td style="text-align:right">Rs.${Math.round(t.seatCharge).toLocaleString('en-IN')}</td><td style="text-align:right">${ao?'Rs.'+Math.round(ao).toLocaleString('en-IN'):'—'}</td><td style="text-align:right"><strong>Rs.${Math.round(t.totalAmount).toLocaleString('en-IN')}</strong></td><td>${t.method.toUpperCase()}</td></tr>`;}).join('');const w=window.open('','_blank','width=900,height=700');w.document.write(`<html><head><title>Report</title><style>body{font-family:sans-serif;font-size:13px;padding:28px;max-width:1000px;margin:auto}h1{font-size:20px;margin:0 0 3px}h2{font-size:13px;color:#888;font-weight:normal;margin:0 0 18px}.stats{display:flex;gap:12px;margin-bottom:22px}.stat{border:1px solid #ddd;border-radius:8px;padding:11px 16px;text-align:center;flex:1}.sv{font-size:17px;font-weight:700}.sl{font-size:11px;color:#888;margin-top:2px}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#f5f5f5;padding:7px 8px;text-align:left;border-bottom:2px solid #ddd;font-size:10px;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #eee}tfoot td{background:#f9f9f9;font-weight:700;border-top:2px solid #ddd}.prnbtn{margin-top:20px;padding:10px 22px;background:#BA7517;color:#fff;border:none;border-radius:7px;cursor:pointer}@media print{.prnbtn{display:none}}</style></head><body><h1>${settings.cafeName}</h1><h2>Daily Report — ${new Date(date).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h2><div class="stats"><div class="stat"><div class="sv">Rs.${Math.round(rev).toLocaleString('en-IN')}</div><div class="sl">Total</div></div><div class="stat"><div class="sv">${tx.length}</div><div class="sl">Sessions</div></div><div class="stat"><div class="sv">${guests}</div><div class="sl">Guests</div></div><div class="stat"><div class="sv">Rs.${Math.round(seatRev).toLocaleString('en-IN')}</div><div class="sl">Seat Rev</div></div><div class="stat"><div class="sv">Rs.${Math.round(aoRev).toLocaleString('en-IN')}</div><div class="sl">Food Rev</div></div></div><table><thead><tr><th>Time</th><th>Customer</th><th>Phone</th><th>Persons</th><th>Duration</th><th>Seat</th><th>Food</th><th>Total</th><th>Payment</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="5">TOTAL (${tx.length} sessions)</td><td style="text-align:right">Rs.${Math.round(seatRev).toLocaleString('en-IN')}</td><td style="text-align:right">Rs.${Math.round(aoRev).toLocaleString('en-IN')}</td><td style="text-align:right">Rs.${Math.round(rev).toLocaleString('en-IN')}</td><td></td></tr></tfoot></table><button class="prnbtn" onclick="window.print()">🖨️ Print</button></body></html>`);w.document.close();}

// ═══ SETTINGS ═══
function renderSettings(){
  document.getElementById('content').innerHTML=`<div class="settings-wrap">
    <div class="sec-box"><div class="sec-title">Café Details</div>
      <div class="fgrp"><label class="flabel">Café name</label><input id="s-name" value="${settings.cafeName}"></div>
      <div class="fgrp"><label class="flabel">Address (on receipt)</label><input id="s-addr" value="${settings.address}" placeholder="Coimbatore..."></div>
      <div class="fgrp" style="margin-bottom:0"><label class="flabel">Rate per hour per seat (₹)</label><input id="s-rate" type="number" value="${settings.ratePerHour}" min="1"></div>
    </div>
    <div class="sec-box"><div class="sec-title">🔐 Security</div>
      <div class="fgrp"><label class="flabel">Manager PIN</label><input id="s-pin" type="password" value="${settings.pin||''}" placeholder="Enter PIN" maxlength="8"></div>
      <div class="fgrp" style="margin-bottom:0"><label class="flabel">Large bill confirmation threshold (₹)</label><input id="s-threshold" type="number" value="${settings.largeBillThreshold||500}" min="0"></div>
      <div class="hint-box" style="margin-top:10px;margin-bottom:0">Default PIN: <strong>1234</strong></div>
    </div>
    <button class="btn-pri" style="margin-top:0" onclick="saveSettings()">Save All Settings</button>
    <div class="sec-box" style="margin-top:14px"><div class="sec-title">Data</div>
      <button class="btn-sec" style="margin-top:0;border-color:var(--blue);color:var(--blue)" onclick="exportAllCSV()">📊 Export All Transactions</button>
      <button class="btn-sec" style="margin-top:8px;border-color:rgba(239,68,68,.5);color:var(--red)" onclick="requirePIN('Clear All Data',confirmClearData)">⚠ Clear All Data</button>
    </div>
    <div class="hint-box" style="margin-top:12px"><strong>The Playhouse Billing v4.0</strong> — Dark UI Edition<br>Firebase · WhatsApp · Persons Edit · Keyboard PIN · Nav Lock<br>Total transactions: <strong>${txns.length}</strong></div>
  </div>`;
}
function saveSettings(){settings.cafeName=document.getElementById('s-name').value.trim()||'THE PLAYHOUSE';settings.address=document.getElementById('s-addr').value.trim();settings.ratePerHour=parseFloat(document.getElementById('s-rate').value)||99;settings.pin=document.getElementById('s-pin').value;settings.largeBillThreshold=parseFloat(document.getElementById('s-threshold').value)||500;saveAll();renderStats();const btn=event.target;btn.textContent='✓ Saved!';setTimeout(()=>{btn.textContent='Save All Settings';},1800);}
function confirmClearData(){showModal(`<h3>⚠ Clear All Data?</h3><div class="warn-box">Permanently deletes ALL ${txns.length} transactions.</div><button class="btn-sec" style="border-color:var(--blue);color:var(--blue);margin-top:0" onclick="exportAllCSV()">📊 Export First</button><button class="btn-pri red" onclick="doClearData()">Delete Everything</button><button class="btn-sec" onclick="closeModal()">Cancel</button>`);}
function doClearData(){seats=mkSeats();txns=[];groupColorMap={};gcIdx=0;coInfo=null;cartItems={};customerCounter=1;saveAll();renderStats();closeModal();if(currentView==='settings')renderSettings();else renderFloor();}

// ═══ NAV ═══
function setView(v){
  if(_receiptActive){showNavLockToast();return;}
  if(v==='settings'){requirePIN('Access Settings',()=>doSetView('settings'));return;}
  doSetView(v);
}
function doSetView(v){currentView=v;['floor','menu','report','settings'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===v));if(v==='floor')renderFloor();else if(v==='menu')renderMenu();else if(v==='report')renderReport();else if(v==='settings')renderSettings();}
function showModal(html){const ov=document.getElementById('overlay');ov.innerHTML=`<div class="mbox">${html}</div>`;ov.style.display='flex';}
function closeModal(){
  if(_receiptActive)return;
  document.getElementById('overlay').style.display='none';
  if(window._coIv){clearInterval(window._coIv);window._coIv=null;}
  _pinActive=false;
}

setInterval(()=>{tickUpdate();if(currentView==='report')renderReport();},1000);
setTimeout(()=>{checkExportBanner();},1500);

async function startApp(){await loadAll();renderStats();renderFloor();checkExportBanner();}
startApp();
</script>
</body>
</html>
