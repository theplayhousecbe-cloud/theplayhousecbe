<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Playhouse — Billing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#f9fafb;--bg4:#f0f1f3;--border:#e2e4e9;--border2:#c8ccd6;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;--gold:#BA7517;--gold2:#8a5510;
  --gold-glow:rgba(186,117,23,0.12);--green:#16a34a;--green-bg:rgba(22,163,74,0.1);
  --amber:#b45309;--amber-bg:rgba(180,83,9,0.08);--blue:#1d4ed8;--blue-bg:rgba(29,78,216,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);--purple:#7c3aed;--purple-bg:rgba(124,58,237,0.08);
  --seat-free-bg:#EAF3DE;--seat-free-border:#3B6D11;--seat-free-text:#1a4a08;
  --seat-occ-bg:#FEF3C7;--seat-occ-border:#BA7517;--seat-occ-text:#78350f;
  --seat-blk-bg:#EFF6FF;--seat-blk-border:#1d4ed8;--seat-blk-text:#1e3a8a;
  --sidebar-w:56px;--hdr-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{height:var(--hdr-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
.body{display:flex;flex:1;overflow:hidden}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.hdr-brand{display:flex;align-items:center;gap:8px;margin-right:10px}
.hdr-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 14px var(--gold-glow)}
.hdr-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px;white-space:nowrap}
.hdr-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}
.hdr-stats{display:flex;gap:6px;flex:1;overflow:hidden}
.hstat{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;white-space:nowrap}
.hstat-icon{font-size:13px;opacity:.7}
.hstat-val{font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.hstat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.hdr-nav{display:flex;gap:4px;flex-shrink:0}
.hnbtn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);font-family:inherit;white-space:nowrap;transition:all .15s;letter-spacing:.3px}
.hnbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.hnbtn.active{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:700;box-shadow:0 2px 8px var(--gold-glow)}
.hnbtn.food-tab{border-color:rgba(124,58,237,.35);color:var(--purple)}
.hnbtn.food-tab.active{background:var(--purple);border-color:var(--purple);box-shadow:0 2px 8px rgba(124,58,237,.25)}
.hnbtn.nav-locked{opacity:.3;cursor:not-allowed}
.reset-btn{padding:6px 10px;border-radius:7px;border:1px solid rgba(239,68,68,0.3);background:transparent;cursor:pointer;font-size:11px;color:var(--red);font-family:inherit;white-space:nowrap;font-weight:600;transition:all .15s}
.reset-btn:hover{background:var(--red-bg);border-color:var(--red)}
.reset-btn.nav-locked{opacity:.3;cursor:not-allowed;pointer-events:none}
.exp-banner{background:linear-gradient(90deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border-bottom:1px solid rgba(245,158,11,.25);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.exp-banner-txt{font-size:11px;color:var(--amber);font-weight:500}
.exp-banner-btns{display:flex;gap:6px}
.exp-banner-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:10px;cursor:pointer;font-family:inherit;font-weight:600}
.exp-banner-btn.pri{background:var(--gold);color:#fff}
.exp-banner-btn.dim{border-color:var(--border2);color:var(--text3)}
.floor-wrap{padding:12px}
.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ldot{width:10px;height:10px;border-radius:3px;border:1.5px solid}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}
.seat{border-radius:10px;padding:10px 6px;cursor:pointer;border:1.5px solid;text-align:center;transition:all .15s;user-select:none;position:relative;backdrop-filter:blur(4px)}
.seat:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.seat:active{transform:scale(.96)}
.seat.free{background:var(--seat-free-bg);border-color:var(--seat-free-border)}
.seat.occ{background:var(--seat-occ-bg);border-color:var(--seat-occ-border)}
.seat.blk{background:var(--seat-blk-bg);border-color:var(--seat-blk-border)}
.sn{font-size:12px;font-weight:700;letter-spacing:.3px}
.seat.free .sn{color:var(--seat-free-text)}
.seat.occ .sn{color:var(--seat-occ-text)}
.seat.blk .sn{color:var(--seat-blk-text)}
.s-lbl{font-size:9px;margin-top:3px;color:var(--seat-free-text);opacity:.6;letter-spacing:.05em;text-transform:uppercase}
.s-lbl-blk{font-size:9px;margin-top:3px;color:var(--seat-blk-text);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.s-tim{font-size:10px;margin-top:3px;color:var(--seat-occ-text);font-weight:600;font-variant-numeric:tabular-nums}
.s-grp{font-size:9px;margin-top:2px;color:var(--text3)}
.grp-dot{width:6px;height:6px;border-radius:50%;position:absolute;top:5px;right:5px}
.food-wrap{padding:14px}
.food-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.food-title{font-size:16px;font-weight:700;color:var(--purple)}
.food-subtitle{font-size:11px;color:var(--text3);margin-top:2px}
.food-new-btn{padding:8px 16px;border-radius:8px;border:none;background:var(--purple);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.food-orders-grid{display:grid;gap:8px}
.food-order-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s}
.food-order-card:hover{border-color:var(--purple);box-shadow:0 2px 12px rgba(124,58,237,.1)}
.food-order-card.active-order{border-color:var(--purple);background:rgba(124,58,237,.03)}
.fo-head{display:flex;justify-content:space-between;align-items:flex-start}
.fo-name{font-size:14px;font-weight:700;color:var(--text)}
.fo-time{font-size:10px;color:var(--text3);margin-top:2px}
.fo-amt{font-size:18px;font-weight:800;color:var(--purple);font-variant-numeric:tabular-nums}
.fo-items{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.6}
.fo-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:5px}
.fo-status.open{background:rgba(124,58,237,.1);color:var(--purple)}
.fo-status.closed{background:var(--green-bg);color:var(--green)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:16px;overflow-y:auto;backdrop-filter:blur(3px)}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:22px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.15);margin:auto;flex-shrink:0}
.mbox h3{font-size:15px;font-weight:600;margin:0 0 16px;color:var(--text)}
.flabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block;font-weight:500}
.fgrp{margin-bottom:12px}
.fgrp input,.fgrp select{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border .15s}
.fgrp input:focus,.fgrp select:focus{border-color:var(--gold);background:var(--bg4)}
.fgrp select option{background:var(--bg3)}
.counter{display:flex;align-items:center;gap:8px}
.cbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cbtn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.cval{font-size:20px;font-weight:700;min-width:28px;text-align:center;color:var(--text);font-variant-numeric:tabular-nums}
.pay-row{display:flex;gap:6px}
.pbtn{flex:1;padding:9px 0;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;font-weight:500;transition:all .15s}
.pbtn:hover{border-color:var(--gold);color:var(--gold)}
.pbtn.sel{border-color:var(--gold);background:var(--gold-glow);color:var(--gold);font-weight:700}
.btn-pri{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:9px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:7px;transition:all .15s;letter-spacing:.2px}
.btn-pri:hover{box-shadow:0 4px 20px var(--gold-glow);transform:translateY(-1px)}
.btn-pri.red{background:linear-gradient(135deg,#ef4444,#c0392b)}.btn-pri.red:hover{box-shadow:0 4px 20px rgba(239,68,68,.3)}
.btn-pri.blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}.btn-pri.blue:hover{box-shadow:0 4px 20px rgba(59,130,246,.3)}
.btn-pri.grn{background:linear-gradient(135deg,#22c55e,#16a34a)}.btn-pri.grn:hover{box-shadow:0 4px 20px rgba(34,197,94,.3)}
.btn-pri.whatsapp{background:linear-gradient(135deg,#25D366,#1aaa50)}
.btn-pri.purple{background:linear-gradient(135deg,#7c3aed,#5b21b6)}.btn-pri.purple:hover{box-shadow:0 4px 20px rgba(124,58,237,.3)}
.btn-sec{width:100%;padding:9px;background:transparent;border:1px solid var(--border2);border-radius:9px;color:var(--text3);font-family:inherit;font-size:12px;cursor:pointer;margin-top:6px;transition:all .15s}
.btn-sec:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.bill-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.brow{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none}
.brow .lbl{color:var(--text3)}.brow .val{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums}
.btotal{font-size:26px;font-weight:800;color:var(--gold);text-align:center;padding:6px 0;font-variant-numeric:tabular-nums}
.hint-box{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);border-radius:8px;padding:8px 11px;font-size:11px;color:var(--amber);margin-bottom:8px;line-height:1.6}
.warn-box{background:var(--red-bg);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:8px 11px;font-size:11px;color:#b91c1c;margin-bottom:8px}
.info-box{background:var(--blue-bg);border:1px solid rgba(29,78,216,.2);border-radius:8px;padding:8px 11px;font-size:11px;color:var(--blue);margin-bottom:8px;line-height:1.6}
.purple-box{background:var(--purple-bg);border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:8px 11px;font-size:11px;color:var(--purple);margin-bottom:8px;line-height:1.6}
.sec-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.sec-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;margin-top:3px;display:inline-block;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.tag.cash{background:var(--green-bg);color:#15803d}
.tag.upi{background:rgba(139,92,246,.15);color:#6d28d9}
.tag.card{background:var(--blue-bg);color:#1d4ed8}
.tag.food{background:var(--purple-bg);color:var(--purple)}
.btn-row{display:flex;gap:7px;margin-top:7px}
.add-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.add-row:last-child{border-bottom:none}
.person-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.person-row.early-out{background:rgba(22,163,74,.05);border-color:rgba(22,163,74,.3)}
.person-row-num{font-size:13px;font-weight:700;color:var(--text);min-width:30px}
.person-row-charge{font-size:12px;font-weight:600;color:var(--gold);font-variant-numeric:tabular-nums}
.person-early-input{padding:5px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100px}
.person-early-input:focus{border-color:var(--green)}
.person-early-label{font-size:10px;color:var(--text3);margin-right:4px}
.person-row-status{font-size:10px;font-weight:600;color:var(--green)}
.rpt{padding:14px}
.date-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.dpill{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.dpill:hover{border-color:var(--border2);color:var(--text2)}
.dpill.active{border-color:var(--gold);background:var(--gold-glow);color:var(--gold);font-weight:600}
.rpt-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
.rstat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.rstat-v{font-size:16px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.rstat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.sec-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;margin-top:2px;font-weight:500}
.exp-btns{display:flex;gap:7px;margin-bottom:12px}
.exp-btn{flex:1;padding:9px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);font-size:11px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;font-weight:500}
.exp-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.pay-bkdn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.pbrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.pbrow:last-child{border-bottom:none}
.tx-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;transition:border .15s}
.tx-item:hover{border-color:var(--border2)}
.tx-item.food-tx{border-left:3px solid var(--purple)}
.tx-seat{font-size:10px;color:var(--text3)}.tx-name{font-size:13px;font-weight:600;color:var(--text)}.tx-time{font-size:10px;color:var(--text3);margin-top:1px}
.tx-amt{font-size:14px;font-weight:700;text-align:right;color:var(--gold);font-variant-numeric:tabular-nums}
.tx-print{padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;font-size:10px;cursor:pointer;color:var(--text3);margin-top:4px;display:block;width:100%;font-family:inherit;transition:all .15s}
.tx-print:hover{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;color:var(--text3);padding:40px;font-size:13px}
.menu-item-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;transition:border .15s}
.menu-item-row:hover{border-color:var(--border2)}
.mi-btn{padding:4px 10px;border-radius:6px;border:1px solid;font-size:11px;cursor:pointer;font-family:inherit;background:transparent;transition:all .15s}
.settings-wrap{padding:14px;max-width:500px}
.reset-inputs{display:flex;gap:10px;margin-bottom:14px}
.reset-field{flex:1;text-align:center}
.reset-field label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.reset-field input{width:100%;padding:10px;border-radius:8px;border:2px solid var(--border2);background:var(--bg3);color:var(--text);font-size:22px;font-weight:700;text-align:center;outline:none}
.reset-field input:focus{border-color:var(--red)}
.reset-preview{background:var(--red-bg);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 14px;margin-bottom:12px;text-align:center}
.reset-preview-count{font-size:32px;font-weight:700;color:var(--red);font-variant-numeric:tabular-nums}
.reset-preview-label{font-size:11px;color:#fca5a5;margin-top:3px}
.reset-preview-range{font-size:10px;color:var(--text3);margin-top:4px}
.phone-box{background:rgba(59,130,246,.07);border:1.5px solid rgba(59,130,246,.25);border-radius:9px;padding:10px 12px;margin-bottom:12px}
.phone-box .flabel{color:var(--blue)}
.phone-box input{background:var(--bg3);border-color:rgba(59,130,246,.3);font-size:15px;padding:9px 11px;letter-spacing:.05em;color:var(--text)}
.big-bill{text-align:center;padding:16px 0}
.big-bill-amt{font-size:48px;font-weight:800;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums}
.big-bill-lbl{font-size:12px;color:var(--text3);margin-top:7px}
.nav-lock-toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(239,68,68,.4);opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:.3px}
.nav-lock-toast.show{opacity:1}
.early-summary{background:var(--green-bg);border:1px solid rgba(22,163,74,.3);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.early-summary-title{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.early-person-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid rgba(22,163,74,.3);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--green);margin:2px;font-weight:600}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">🎲</div>
      <div><div class="hdr-name" id="hdr-cafe-name">THE PLAYHOUSE</div></div>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-stats" id="stats"></div>
    <div class="hdr-nav">
      <button class="hnbtn active" onclick="setView('floor')" id="btn-floor">Floor</button>
      <button class="hnbtn food-tab" onclick="setView('food')" id="btn-food">🍽 Food Bill</button>
      <button class="hnbtn" onclick="setView('menu')" id="btn-menu">Menu</button>
      <button class="hnbtn" onclick="setView('report')" id="btn-report">Report</button>
      <button class="hnbtn" onclick="setView('settings')" id="btn-settings">⚙</button>
      <button class="reset-btn" onclick="openReset()">🗑</button>
    </div>
  </div>
  <div id="export-banner" style="display:none"></div>
  <div class="body">
    <div class="main" id="content"></div>
  </div>
</div>

<div class="nav-lock-toast" id="nav-lock-toast">⚠ Press Done before switching screens</div>
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this&&!_pinActive&&!_receiptActive)closeModal()"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBaocyc92pXMmmNx_foVZvZSYX3L8NYuTU",authDomain:"the-playhouse-cafe.firebaseapp.com",projectId:"the-playhouse-cafe",storageBucket:"the-playhouse-cafe.firebasestorage.app",messagingSenderId:"321873657191",appId:"1:321873657191:web:feababb0723ca3ef2a03c2"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();window.db=db;

const TOTAL_SEATS=48;
const GRP_COLORS=['#f59e0b','#3b82f6','#22c55e','#a855f7','#ef4444','#14b8a6','#f97316','#06b6d4','#eab308','#6b7280'];
const MENU_CATS=['Hot Drinks','Cold Drinks','Food','Snacks','Desserts','Other'];
const DEFAULT_MENU=[
  {id:'m01',name:'Filter Coffee',price:30,category:'Hot Drinks'},{id:'m02',name:'Masala Chai',price:25,category:'Hot Drinks'},{id:'m03',name:'Green Tea',price:20,category:'Hot Drinks'},
  {id:'m04',name:'Cold Coffee',price:60,category:'Cold Drinks'},{id:'m05',name:'Fresh Lime Soda',price:40,category:'Cold Drinks'},{id:'m06',name:'Lassi',price:50,category:'Cold Drinks'},
  {id:'m07',name:'Idli Sambar',price:60,category:'Food'},{id:'m08',name:'Masala Dosa',price:80,category:'Food'},{id:'m09',name:'Sandwich',price:70,category:'Food'},
  {id:'m10',name:'Samosa',price:20,category:'Snacks'},{id:'m11',name:'Vada',price:30,category:'Snacks'},{id:'m12',name:'Banana Cake',price:40,category:'Desserts'},
];

let settings={cafeName:'THE PLAYHOUSE',address:'',ratePerHour:99,pin:'1234',lastExportDate:'',largeBillThreshold:500};
let seats=mkSeats(),txns=[],menuItems=JSON.parse(JSON.stringify(DEFAULT_MENU));
let foodOrders=[];
let groupColorMap={},gcIdx=0,currentView='floor',selectedMethod='cash';
let cartItems={},coInfo=null,reportDate=todayStr();
let _pinCallback=null,_pinValue='',_pinActive=false,_lastDateStr=todayStr();
let customerCounter=1,_receiptActive=false;

function mkSeats(){return Array.from({length:TOTAL_SEATS},(_,i)=>({id:i+1,occupied:false,name:'',t0:null,groupId:null,groupSize:0,blocked:false,blockInfo:null}));}
async function saveAll(){await db.collection("playhouse").doc("data").set({settings,seats,txns,menuItems,customerCounter,foodOrders});}
async function loadAll(){
  const doc=await db.collection("playhouse").doc("data").get();
  if(doc.exists){const d=doc.data();settings=d.settings||settings;seats=d.seats||seats;txns=d.txns||txns;menuItems=d.menuItems||menuItems;customerCounter=d.customerCounter||1;foodOrders=d.foodOrders||[];}
  if(settings.cafeName==='My Café'||settings.cafeName==='My Cafe'||settings.cafeName==='The Playhouse')settings.cafeName='THE PLAYHOUSE';
}

function getGrpColor(gid){if(!groupColorMap[gid]){groupColorMap[gid]=GRP_COLORS[gcIdx%GRP_COLORS.length];gcIdx++;}return groupColorMap[gid];}

function calcCheckoutCharge(t0,persons,earlyOuts){
  const now=Date.now();const r=settings.ratePerHour;let total=0;
  for(let i=0;i<persons;i++){
    const endTime=(earlyOuts&&earlyOuts[i])?earlyOuts[i]:now;
    const mins=(endTime-t0)/60000;
    total+=(mins<=60?r:Math.ceil(r+(r/60)*(mins-60)));
  }
  return total;
}
function calcSeatCharge(t0,persons){const mins=(Date.now()-t0)/60000,r=settings.ratePerHour;return mins<=60?r*persons:Math.ceil((r+(r/60)*(mins-60))*persons);}
function calcSeatChargeAtTime(t0,t1,persons){const mins=(t1-t0)/60000,r=settings.ratePerHour;return mins<=60?r*persons:Math.ceil((r+(r/60)*(mins-60))*persons);}
function calcCartTotal(){return Object.entries(cartItems).reduce((s,[id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?s+it.price*qty:s;},0);}
function getCartAddons(){return Object.entries(cartItems).map(([id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?{name:it.name,price:it.price,qty}:null;}).filter(Boolean);}
function fmtDur(t0){const s=Math.floor((Date.now()-t0)/1000);return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');}
function fmtMins(ms){const m=Math.floor(ms/60000);return(Math.floor(m/60)>0?Math.floor(m/60)+'h ':'')+m%60+'m';}
function inr(n){return '₹'+Math.round(n).toLocaleString('en-IN');}
function todayStr(){return new Date().toDateString();}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toDateString();}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return '—';const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function allDates(){const dates=[...new Set(txns.map(t=>t.date))].sort((a,b)=>new Date(b)-new Date(a));if(!dates.includes(todayStr()))dates.unshift(todayStr());return dates;}
function txnsForDate(d){return txns.filter(t=>t.date===d);}
function nowTimeVal(){return new Date().toTimeString().slice(0,5);}

function showNavLockToast(){const t=document.getElementById('nav-lock-toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function lockNav(){_receiptActive=true;document.querySelectorAll('.hnbtn,.reset-btn').forEach(b=>b.classList.add('nav-locked'));}
function unlockNav(){_receiptActive=false;document.querySelectorAll('.hnbtn,.reset-btn').forEach(b=>b.classList.remove('nav-locked'));}

// ═══ PIN ═══
function requirePIN(title,callback){
  if(!settings.pin){callback();return;}
  _pinCallback=callback;_pinValue='';_pinActive=true;
  showModal(pinModalHTML(title,''));
  document.removeEventListener('keydown',_pinKeyHandler);
  document.addEventListener('keydown',_pinKeyHandler);
}
function _pinKeyHandler(e){
  if(!_pinActive)return;
  if(e.key>='0'&&e.key<='9'){e.preventDefault();pinKey(e.key);}
  else if(e.key==='Backspace'){e.preventDefault();pinDel();}
  else if(e.key==='Enter'){e.preventDefault();pinSubmit();}
  else if(e.key==='Escape'){e.preventDefault();pinCancel();}
}
function pinDots(){return Array.from({length:4},(_,i)=>`<div style="width:13px;height:13px;border-radius:50%;border:2px solid ${i<_pinValue.length?'#f0a500':'rgba(255,255,255,0.2)'};background:${i<_pinValue.length?'#f0a500':'transparent'};transition:all .18s;box-shadow:${i<_pinValue.length?'0 0 10px rgba(240,165,0,.5)':'none'}"></div>`).join('');}
function pinModalHTML(title,err){
  const keys=[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinKey('${n}')" style="height:56px;border-radius:11px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#e8eaf0;font-size:22px;font-weight:300;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s" onmouseover="this.style.background='rgba(240,165,0,0.15)';this.style.borderColor='rgba(240,165,0,0.4)'" onmouseout="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.08)'" onmousedown="this.style.transform='scale(0.92)'" onmouseup="this.style.transform='scale(1)'">${n}</button>`).join('');
  return `<div style="margin:-22px;padding:26px 22px 22px;background:linear-gradient(160deg,#0d0f1a 0%,#131a2e 50%,#0f2040 100%);border-radius:16px;color:#e8eaf0">
    <div style="text-align:center;margin-bottom:4px">
      <div style="width:46px;height:46px;background:linear-gradient(135deg,#f0a500,#c47d00);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;box-shadow:0 6px 20px rgba(240,165,0,.3)">🔐</div>
      <div style="font-size:15px;font-weight:600;letter-spacing:.3px">${title}</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase">Manager PIN Required</div>
    </div>
    <div data-dots style="display:flex;justify-content:center;gap:14px;margin:20px 0 18px">${pinDots()}</div>
    ${err?`<div style="text-align:center;color:#fca5a5;font-size:12px;margin-bottom:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:7px;padding:7px">${err}</div>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:9px">${keys}
      <button onclick="pinDel()" style="height:56px;border-radius:11px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;transition:all .12s">⌫</button>
      <button onclick="pinKey('0')" style="height:56px;border-radius:11px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#e8eaf0;font-size:22px;font-weight:300;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s">0</button>
      <button onclick="pinSubmit()" style="height:56px;border-radius:11px;border:none;background:linear-gradient(135deg,#f0a500,#c47d00);color:#000;font-size:22px;font-weight:700;cursor:pointer;transition:all .12s;box-shadow:0 4px 16px rgba(240,165,0,.3)">✓</button>
    </div>
    <button onclick="pinCancel()" style="width:100%;padding:10px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:rgba(255,255,255,0.35);font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:1px;text-transform:uppercase;transition:all .2s">Cancel</button>
    <div style="text-align:center;margin-top:10px;font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:.8px;text-transform:uppercase">Keyboard supported · Esc to cancel</div>
  </div>`;
}
function refreshPinDots(){const ov=document.getElementById('overlay');const dc=ov&&ov.querySelector('[data-dots]');if(dc)dc.innerHTML=pinDots();}
function pinKey(d){if(_pinValue.length>=4)return;_pinValue+=d;refreshPinDots();if(_pinValue.length>=4)setTimeout(pinSubmit,160);}
function pinDel(){_pinValue=_pinValue.slice(0,-1);refreshPinDots();}
function pinSubmit(){
  if(_pinValue===settings.pin){const cb=_pinCallback;_pinCallback=null;_pinActive=false;_pinValue='';document.removeEventListener('keydown',_pinKeyHandler);closeModal();cb();}
  else{_pinValue='';const ov=document.getElementById('overlay');if(ov)ov.querySelector('.mbox').innerHTML=pinModalHTML('Wrong PIN','❌  Incorrect PIN — try again');}
}
function pinCancel(){_pinCallback=null;_pinActive=false;_pinValue='';document.removeEventListener('keydown',_pinKeyHandler);closeModal();}

window.addEventListener('beforeunload',function(e){const active=seats.filter(s=>s.occupied).length;if(active>0){e.preventDefault();e.returnValue=`${active} seat(s) still active!`;return e.returnValue;}});

function renderStats(){
  const occ=seats.filter(s=>s.occupied).length,blk=seats.filter(s=>s.blocked).length,openFood=foodOrders.filter(f=>f.status==='open').length;
  document.getElementById('hdr-cafe-name').textContent=settings.cafeName;
  let html=`<div class="hstat"><span class="hstat-icon">🪑</span><div><div class="hstat-val">${occ}<span style="color:var(--text3);font-weight:400;font-size:11px">/${TOTAL_SEATS}</span></div><div class="hstat-lbl">Occupied</div></div></div>`;
  if(blk)html+=`<div class="hstat"><span class="hstat-icon">🔒</span><div><div class="hstat-val" style="color:var(--blue)">${blk}</div><div class="hstat-lbl">Reserved</div></div></div>`;
  if(openFood)html+=`<div class="hstat"><span class="hstat-icon">🍽</span><div><div class="hstat-val" style="color:var(--purple)">${openFood}</div><div class="hstat-lbl">Food Orders</div></div></div>`;
  document.getElementById('stats').innerHTML=html;
}

function checkExportBanner(){
  const yd=yesterday(),ytx=txnsForDate(yd),banner=document.getElementById('export-banner');
  if(!banner)return;
  if(ytx.length>0&&settings.lastExportDate!==yd){const rev=ytx.reduce((s,t)=>s+t.totalAmount,0);banner.style.display='block';banner.innerHTML=`<div class="exp-banner"><div class="exp-banner-txt">📊 Yesterday not backed up — ${ytx.length} sessions · ${inr(rev)}</div><div class="exp-banner-btns"><button class="exp-banner-btn pri" onclick="exportCSV('${yd}');markExported('${yd}')">Export CSV</button><button class="exp-banner-btn" onclick="exportPDF('${yd}');markExported('${yd}')">PDF</button><button class="exp-banner-btn dim" onclick="markExported('${yd}')">Dismiss</button></div></div>`;}
  else{banner.style.display='none';}
}
function markExported(date){settings.lastExportDate=date;saveAll();checkExportBanner();}

setInterval(()=>{const today=todayStr();if(today!==_lastDateStr){const prev=_lastDateStr;_lastDateStr=today;const ptx=txnsForDate(prev);if(ptx.length>0&&settings.lastExportDate!==prev){const rev=ptx.reduce((s,t)=>s+t.totalAmount,0);showModal(`<div style="text-align:center;margin-bottom:14px"><div style="font-size:32px;margin-bottom:8px">🌙</div><h3>New day — export yesterday?</h3></div><div class="hint-box">${ptx.length} sessions · ${inr(rev)} revenue</div><button class="btn-pri" onclick="exportCSV('${prev}');markExported('${prev}');closeModal()">📊 Export CSV</button><button class="btn-pri grn" onclick="exportPDF('${prev}');markExported('${prev}');closeModal()">📄 Export PDF</button><button class="btn-sec" onclick="markExported('${prev}');closeModal()">Skip</button>`);}}},60000);

// ═══ RESET ═══
let _resetCutoff=0;
function openReset(){if(_receiptActive){showNavLockToast();return;}requirePIN('Reset Data',showResetModal);}
function showResetModal(){
  const rsvCount=seats.filter(s=>s.blocked).length;
  showModal(`<h3 style="color:var(--red)">🗑 Reset Data</h3>
    <p style="font-size:12px;color:var(--text3);margin:-8px 0 16px;line-height:1.6">Delete transactions by time range.</p>
    <div class="reset-inputs">
      <div class="reset-field"><label>Days</label><input type="number" id="reset-days" min="0" max="365" value="0" oninput="updateResetPreview()"></div>
      <div style="display:flex;align-items:center;padding-top:22px;color:var(--text3);font-size:22px">+</div>
      <div class="reset-field"><label>Hours</label><input type="number" id="reset-hours" min="0" max="23" value="0" oninput="updateResetPreview()"></div>
    </div>
    <div class="reset-preview"><div class="reset-preview-count" id="reset-count">0</div><div class="reset-preview-label" id="reset-label">Enter days or hours above</div><div class="reset-preview-range" id="reset-range"></div></div>
    ${rsvCount>0?`<div class="hint-box">⚠ <strong>${rsvCount} reservation${rsvCount>1?'s':''}</strong> active — can clear too.</div>`:''}
    <div class="warn-box">⚠ Permanently deletes from Firebase.</div>
    <button class="btn-sec" style="border-color:var(--blue);color:var(--blue);margin-top:0" onclick="exportAllCSV()">📊 Export Backup First</button>
    <button class="btn-pri red" id="reset-confirm-btn" onclick="confirmReset()" disabled style="opacity:.4;cursor:not-allowed">🗑 Proceed</button>
    ${rsvCount>0?`<button class="btn-pri blue" style="margin-top:6px" onclick="confirmClearReservationsOnly()">🔒 Clear Reservations Only</button>`:''}
    <button class="btn-sec" onclick="closeModal()">Cancel</button>`);
  setTimeout(updateResetPreview,30);
}
function updateResetPreview(){
  const days=parseInt(document.getElementById('reset-days')?.value)||0,hours=parseInt(document.getElementById('reset-hours')?.value)||0;
  const totalMs=(days*24+hours)*60*60*1000;_resetCutoff=Date.now()-totalMs;
  const toDelete=txns.filter(t=>t.t1>=_resetCutoff);
  const countEl=document.getElementById('reset-count'),labelEl=document.getElementById('reset-label'),rangeEl=document.getElementById('reset-range'),btnEl=document.getElementById('reset-confirm-btn');
  if(countEl)countEl.textContent=toDelete.length;
  if(labelEl){if(days===0&&hours===0){labelEl.textContent='Enter days or hours above';}else{const ts=(days>0?days+' day'+(days>1?'s':''):'')+(days>0&&hours>0?' + ':'')+(hours>0?hours+' hour'+(hours>1?'s':''):'');labelEl.textContent='transaction'+(toDelete.length!==1?'s':'')+' from last '+ts+' deleted';}}
  if(rangeEl&&totalMs>0){rangeEl.textContent='From '+new Date(_resetCutoff).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+' → Now';}else if(rangeEl){rangeEl.textContent='';}
  if(btnEl){const can=totalMs>0&&toDelete.length>0;btnEl.disabled=!can;btnEl.style.opacity=can?'1':'0.4';btnEl.style.cursor=can?'pointer':'not-allowed';btnEl.textContent='🗑 Delete '+toDelete.length+' Transaction'+(toDelete.length!==1?'s':'');}
}
function confirmReset(){
  const toDelete=txns.filter(t=>t.t1>=_resetCutoff);if(!toDelete.length){alert('No transactions.');return;}
  const rsvCount=seats.filter(s=>s.blocked).length;
  const fromStr=new Date(_resetCutoff).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  let html=`<h3 style="text-align:center;color:var(--red)">⚠ Confirm Delete</h3><div style="text-align:center;margin:14px 0"><div style="font-size:52px;font-weight:700;color:var(--red);line-height:1;font-variant-numeric:tabular-nums">${toDelete.length}</div><div style="font-size:13px;color:var(--text2);margin-top:8px">transaction${toDelete.length!==1?'s':''} permanently deleted</div><div style="font-size:10px;color:var(--text3);background:var(--bg3);border-radius:6px;padding:5px 10px;display:inline-block;margin-top:7px">From ${fromStr} → Now</div></div><div class="warn-box" style="text-align:center">Cannot be undone.</div>`;
  if(rsvCount>0){html+=`<button class="btn-pri red" style="margin-top:0" onclick="doResetTxns();confirmClearReservationsOnly()">🗑 Delete + Clear ${rsvCount} Reservation${rsvCount>1?'s':''}</button><button class="btn-sec" style="border-color:var(--red);color:var(--red);margin-top:6px" onclick="doResetTxns()">Delete Transactions Only</button>`;}
  else{html+=`<button class="btn-pri red" style="margin-top:0" onclick="doResetTxns()">Yes — Delete</button>`;}
  html+=`<button class="btn-sec" onclick="showResetModal()">← Go Back</button>`;
  showModal(html);
}
function confirmClearReservationsOnly(){
  const rsvCount=seats.filter(s=>s.blocked).length;
  if(!rsvCount){showModal('<h3>No Reservations</h3><p style="color:var(--text3);font-size:13px">No active reservations.</p><button class="btn-sec" onclick="closeModal()">OK</button>');return;}
  let rsvList='';
  seats.filter(s=>s.blocked).forEach(s=>{const bi=s.blockInfo||{};const dateStr=bi.date?new Date(bi.date+'T00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';rsvList+=`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border)"><span style="font-weight:500">${bi.name||'—'}</span><span style="color:var(--blue)">${dateStr}${bi.time?' '+bi.time:''}</span></div>`;});
  showModal(`<h3 style="text-align:center;color:var(--blue)">🔒 Clear All Reservations?</h3><div style="text-align:center;margin:10px 0 14px"><div style="font-size:52px;font-weight:700;color:var(--blue);line-height:1">${rsvCount}</div><div style="font-size:13px;color:var(--text2);margin-top:6px">reservation${rsvCount!==1?'s':''} removed</div></div><div style="max-height:160px;overflow-y:auto;background:var(--bg3);border-radius:8px;padding:8px 12px;margin-bottom:12px">${rsvList}</div><div class="warn-box" style="text-align:center">Reserved seats become <strong>free</strong>. Cannot be undone.</div><button class="btn-pri blue" style="margin-top:0" onclick="doClearReservations()">Yes — Clear All</button><button class="btn-sec" onclick="closeModal()">Keep Reservations</button>`);
}
function doResetTxns(){const before=txns.length;txns=txns.filter(t=>t.t1<_resetCutoff);const deleted=before-txns.length;saveAll();renderStats();if(currentView==='report')renderReport();else if(currentView==='floor')renderFloor();showModal(`<div style="text-align:center;padding:14px 0"><div style="font-size:48px;margin-bottom:10px">✅</div><h3>Deleted</h3><p style="font-size:13px;color:var(--text3);margin-top:10px;line-height:1.8"><span style="font-size:26px;font-weight:700;color:var(--red);display:block;font-variant-numeric:tabular-nums">${deleted}</span>transaction${deleted!==1?'s':''} deleted.<br><strong style="color:var(--text)">${txns.length}</strong> remaining.</p></div><button class="btn-pri grn" onclick="closeModal()">Done</button>`);}
function doClearReservations(){const n=seats.filter(s=>s.blocked).length;seats=seats.map(s=>s.blocked?{...s,blocked:false,blockInfo:null}:s);saveAll();renderStats();if(currentView==='floor')renderFloor();showModal(`<div style="text-align:center;padding:14px 0"><div style="font-size:48px;margin-bottom:10px">✅</div><h3>Reservations Cleared</h3><p style="font-size:13px;color:var(--text3);margin-top:10px"><span style="font-size:26px;font-weight:700;color:var(--blue);display:block">${n}</span>reservations removed.</p></div><button class="btn-pri grn" onclick="closeModal()">Done</button>`);}

// ═══ FLOOR ═══
function renderFloor(){
  let html=`<div class="floor-wrap">
    <div class="legend">
      <span class="leg"><span class="ldot" style="background:var(--seat-free-bg);border-color:var(--seat-free-border)"></span>Free</span>
      <span class="leg"><span class="ldot" style="background:var(--seat-occ-bg);border-color:var(--seat-occ-border)"></span>Occupied</span>
      <span class="leg"><span class="ldot" style="background:var(--seat-blk-bg);border-color:var(--seat-blk-border)"></span>Reserved</span>
    </div>
    <div class="seat-grid">`;
  seats.forEach(seat=>{
    const num=String(seat.id).padStart(2,'0');
    if(seat.blocked){
      const bi=seat.blockInfo||{};
      html+=`<div class="seat blk" onclick="openBlockedOptions(${seat.id})">
        <div class="sn">#${num}</div>
        <div class="s-lbl-blk">RSVD</div>
        <div class="s-grp" style="color:var(--seat-blk-text);font-size:9px">${(bi.name||'').substring(0,9)||'—'}</div>
        ${bi.date?`<div class="s-grp" style="font-size:9px">${fmtDate(bi.date)}</div>`:''}
        ${bi.time?`<div class="s-grp" style="font-size:9px">${bi.time}</div>`:''}
      </div>`;
    } else if(seat.occupied){
      const c=getGrpColor(seat.groupId);
      const earlyCount=seat.earlyOuts?Object.keys(seat.earlyOuts).length:0;
      html+=`<div class="seat occ" onclick="openCheckout('${seat.groupId}')">
        <span class="grp-dot" style="background:${c};box-shadow:0 0 6px ${c}80"></span>
        <div class="sn">#${num}</div>
        <div class="s-tim" id="t${seat.id}">${fmtDur(seat.t0)}</div>
        <div class="s-grp">${seat.name||'—'} · ${seat.groupSize}p${earlyCount>0?` · <span style="color:var(--green);font-weight:600">${earlyCount} left</span>`:''}</div>
      </div>`;
    } else {
      html+=`<div class="seat free" onclick="openFreeOptions(${seat.id})">
        <div class="sn">#${num}</div>
        <div class="s-lbl">free</div>
      </div>`;
    }
  });
  html+='</div></div>';
  document.getElementById('content').innerHTML=html;
}
function tickUpdate(){if(currentView!=='floor')return;seats.forEach(s=>{if(s.occupied){const te=document.getElementById('t'+s.id);if(te)te.textContent=fmtDur(s.t0);}});renderStats();}
function openFreeOptions(id){showModal(`<h3>Seat #${String(id).padStart(2,'0')}</h3><p style="font-size:12px;color:var(--text3);margin:-8px 0 14px">What would you like to do?</p><button class="btn-pri" style="margin-top:0" onclick="closeModal();openCheckin(${id})">✓ Check In Guest</button><button class="btn-pri blue" onclick="closeModal();openBlockSeat(${id})">🔒 Reserve for Appointment</button><button class="btn-sec" onclick="closeModal()">Cancel</button>`);}

// ═══ CHECK-IN ═══
function openCheckin(startId,prefillName=''){
  showModal(`<h3>Check in — Seat #${String(startId).padStart(2,'0')}</h3>
    <div class="fgrp"><label class="flabel">Customer name <span style="font-size:9px;color:var(--text3)">(blank → auto ID)</span></label>
      <input id="ci-name" placeholder="#${String(customerCounter).padStart(3,'0')}" value="${prefillName}" autocomplete="off" style="text-transform:uppercase">
    </div>
    <div class="fgrp"><label class="flabel">Persons</label>
      <div class="counter"><button class="cbtn" onclick="chgP(-1)">−</button><span class="cval" id="ci-p">1</span><button class="cbtn" onclick="chgP(1)">+</button><span style="font-size:11px;color:var(--text3)">× 1 seat each</span></div>
    </div>
    <div class="hint-box"><strong>${inr(settings.ratePerHour)}/hr per seat · Min 1 hour</strong></div>
    <div id="ci-warn"></div>
    <button class="btn-pri" onclick="doCheckin(${startId})">Start Session</button>
    <button class="btn-sec" onclick="closeModal()">Cancel</button>`);
}
function chgP(d){const el=document.getElementById('ci-p');const n=Math.max(1,parseInt(el.textContent)+d);el.textContent=n;const avail=seats.filter(s=>!s.occupied&&!s.blocked).length;const w=document.getElementById('ci-warn');if(w)w.innerHTML=n>avail?`<div class="warn-box">Only ${avail} free seats!</div>`:'';}
function doCheckin(startId){
  const persons=parseInt(document.getElementById('ci-p').textContent);
  let name=document.getElementById('ci-name').value.trim().toUpperCase();
  if(!name){name='#'+String(customerCounter).padStart(3,'0');customerCounter++;}
  const free=seats.filter(s=>!s.occupied&&!s.blocked).sort((a,b)=>{const ai=a.id>=startId?a.id-startId:a.id+TOTAL_SEATS,bi=b.id>=startId?b.id-startId:b.id+TOTAL_SEATS;return ai-bi;});
  if(free.length<persons){alert(`Only ${free.length} free seats!`);return;}
  const toOcc=free.slice(0,persons).map(s=>s.id),gid='g'+Date.now(),t0=Date.now();
  seats=seats.map(s=>toOcc.includes(s.id)?{...s,occupied:true,name,t0,groupId:gid,groupSize:persons,earlyOuts:{}}:s);
  saveAll();closeModal();if(currentView==='floor')renderFloor();
}

function chgBlk(d){const el=document.getElementById('blk-n');el.textContent=Math.max(1,parseInt(el.textContent)+d);}
function chgRsvCart(itemId,d){
  if(!window._rsvCart)window._rsvCart={};
  window._rsvCart[itemId]=Math.max(0,(window._rsvCart[itemId]||0)+d);
  if(!window._rsvCart[itemId])delete window._rsvCart[itemId];
  const el=document.getElementById('rsvcart-'+itemId);if(el)el.textContent=window._rsvCart[itemId]||0;
  const total=Object.entries(window._rsvCart).reduce((s,[id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?s+it.price*qty:s;},0);
  const te=document.getElementById('rsv-total');if(te)te.textContent=inr(total);
}
function doBlockSeat(startId){
  const name=document.getElementById('blk-name').value.trim(),persons=parseInt(document.getElementById('blk-n').textContent),date=document.getElementById('blk-date').value,time=document.getElementById('blk-time').value,note=document.getElementById('blk-note').value.trim();

  const free=seats.filter(s=>!s.occupied&&!s.blocked).sort((a,b)=>{const ai=a.id>=startId?a.id-startId:a.id+TOTAL_SEATS,bi=b.id>=startId?b.id-startId:b.id+TOTAL_SEATS;return ai-bi;});
  if(free.length<persons){alert(`Only ${free.length} free seats!`);return;}
  const toBlk=free.slice(0,persons).map(s=>s.id);
  seats=seats.map(s=>toBlk.includes(s.id)?{...s,blocked:true,blockInfo:{name,persons,date,time,note,preOrder}}:s);
  window._rsvCart={};saveAll();closeModal();if(currentView==='floor')renderFloor();
}
function openBlockedOptions(id){

  showModal(`<h3>Reserved — Seat #${String(id).padStart(2,'0')}</h3>

    <button class="btn-sec" onclick="closeModal()">Close</button>`);
}
function convertToCheckin(id){const seat=seats.find(s=>s.id===id),bi=seat.blockInfo||{};const name=bi.name||'';if(bi.preOrder&&bi.preOrder.length){cartItems={};bi.preOrder.forEach(a=>{const it=menuItems.find(m=>m.name===a.name);if(it)cartItems[it.id]=a.qty;});}seats=seats.map(s=>s.id===id?{...s,blocked:false,blockInfo:null}:s);saveAll();closeModal();openCheckin(id,name);}

    <div class="fgrp"><label class="flabel">Name</label><input id="eblk-name" value="${bi.name||''}"></div>

function chgEBlk(d){const el=document.getElementById('eblk-n');el.textContent=Math.max(1,parseInt(el.textContent)+d);}

function unblockSeat(id){seats=seats.map(s=>s.id===id?{...s,blocked:false,blockInfo:null}:s);saveAll();closeModal();if(currentView==='floor')renderFloor();}

// ═══ CHECKOUT ═══
function openCheckout(gid){
  selectedMethod='cash';const grp=seats.filter(s=>s.groupId===gid);if(!grp.length)return;
  const s0=grp[0],persons=s0.groupSize;
  if(!coInfo||coInfo.gid!==gid)cartItems={};
  const existingEarlyOuts=s0.earlyOuts||{};
  coInfo={gid,t0:s0.t0,persons,earlyOuts:{...existingEarlyOuts}};
  const seatNums=grp.map(s=>'#'+String(s.id).padStart(2,'0')).join(', ');
  const earlyCount=Object.keys(existingEarlyOuts).length;
  const remainingPersons=persons-earlyCount;
  const sc=calcCheckoutCharge(s0.t0,persons,coInfo.earlyOuts);
  const cats=[...new Set(menuItems.map(m=>m.category))];
  const menuHTML=cats.map(cat=>`<div style="margin-bottom:8px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">${cat}</div>${menuItems.filter(m=>m.category===cat).map(it=>`<div class="add-row"><div><span style="font-size:12px;color:var(--text)">${it.name}</span><span style="font-size:11px;color:var(--text3);margin-left:4px">${inr(it.price)}</span></div><div style="display:flex;align-items:center;gap:5px"><button class="cbtn" style="width:24px;height:24px;font-size:13px" onclick="chgCart('${it.id}',-1)">−</button><span style="font-size:12px;min-width:14px;text-align:center;color:var(--text)" id="cart-${it.id}">${cartItems[it.id]||0}</span><button class="cbtn" style="width:24px;height:24px;font-size:13px" onclick="chgCart('${it.id}',1)">+</button></div></div>`).join('')}</div>`).join('');

  let earlyOutBadge='';
  if(earlyCount>0){
    earlyOutBadge=`<div class="early-summary"><div class="early-summary-title">✓ Early checkouts recorded</div>`;
    Object.entries(existingEarlyOuts).forEach(([pi,ts])=>{earlyOutBadge+=`<span class="early-person-chip">Person ${parseInt(pi)+1} · ${new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>`;});
    earlyOutBadge+='</div>';
  }

  showModal(`<h3>Checkout — ${persons}p · ${s0.name}</h3>
    ${earlyOutBadge}
    <div class="bill-box">
      <div class="brow"><span class="lbl">Customer</span><span class="val">${s0.name}</span></div>
      <div class="brow"><span class="lbl">Seats</span><span class="val" style="font-size:10px">${seatNums}</span></div>
      <div class="brow"><span class="lbl">Check-in</span><span class="val">${new Date(s0.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span></div>
     <div class="brow"><span class="lbl">Duration</span><span class="val" id="co-d">${fmtDur(s0.t0)}</span></div>
<div class="brow"><span class="lbl">Exit time</span><span class="val"><input id="co-exit-time" type="time" value="${new Date().toTimeString().slice(0,5)}" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;font-size:12px;outline:none" oninput="refreshCoTotals()"></span></div>
      <div class="brow"><span class="lbl">Seat charge</span><span class="val" id="co-sc">${inr(sc)}</span></div>
      ${earlyCount>0?`<div class="brow"><span class="lbl" style="color:var(--green)">Early outs</span><span class="val" style="color:var(--green)">${earlyCount} person${earlyCount>1?'s':''} · ${remainingPersons} still here</span></div>`:''}
      <div class="brow"><span class="lbl">Food & drinks</span><span class="val" id="co-ao">₹0</span></div>
      <div style="border-top:1px dashed var(--border2);margin:8px 0"></div>
      <div class="btotal" id="co-total">${inr(sc)}</div>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px">+ Add food & beverages</div>
    <div style="max-height:155px;overflow-y:auto;border:1px solid var(--border);border-radius:9px;padding:8px 10px;background:var(--bg3);margin-bottom:10px">${menuHTML}</div>
    <div class="phone-box">
      <label class="flabel">📱 WhatsApp number <span style="font-size:10px;font-weight:400;color:var(--blue)">(for bill delivery)</span></label>
      <input id="co-phone" type="tel" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric">
    </div>
    <div class="fgrp"><label class="flabel">Payment method</label>
      <div class="pay-row"><button class="pbtn sel" id="pm-cash" onclick="selM('cash')">CASH</button><button class="pbtn" id="pm-upi" onclick="selM('upi')">UPI</button><button class="pbtn" id="pm-card" onclick="selM('card')">CARD</button></div>
    </div>
    <button class="btn-pri" id="co-btn" onclick="doCheckout('${gid}')">Confirm Checkout — ${inr(sc)}</button>
    <button class="btn-sec" style="border-color:var(--green);color:var(--green)" onclick="openEarlyCheckout('${gid}')">🚶 Early Person Checkout</button>
    <button class="btn-sec" style="border-color:var(--gold);color:var(--gold)" onclick="requirePIN('Edit/Cancel Session',()=>openEditSession('${gid}'))">✎ Edit / Cancel Session</button>
    <button class="btn-sec" onclick="closeModal()">Keep Session Running</button>`);
  if(window._coIv)clearInterval(window._coIv);window._coIv=setInterval(refreshCoTotals,1000);
}

function openEarlyCheckout(gid){
  if(window._coIv){clearInterval(window._coIv);window._coIv=null;}
  const grp=seats.filter(s=>s.groupId===gid);if(!grp.length)return;
  const s0=grp[0],persons=s0.groupSize;
  const earlyOuts=coInfo&&coInfo.gid===gid?{...coInfo.earlyOuts}:{...s0.earlyOuts||{}};
  let rowsHTML='';
  for(let i=0;i<persons;i++){
    const alreadyLeft=earlyOuts[i];
    const leftTime=alreadyLeft?new Date(alreadyLeft).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'';
    if(alreadyLeft){
      rowsHTML+=`<div class="person-row early-out">
        <div class="person-row-num">P${i+1}</div>
        <div style="flex:1;padding:0 8px"><span style="font-size:11px;color:var(--green);font-weight:600">✓ Left at ${leftTime}</span></div>
        <button onclick="undoEarlyOut('${gid}',${i})" style="font-size:10px;padding:3px 8px;border:1px solid rgba(239,68,68,.4);border-radius:5px;background:transparent;color:var(--red);cursor:pointer">Undo</button>
      </div>`;
    } else {
      rowsHTML+=`<div class="person-row" id="prow-${i}">
        <div class="person-row-num">P${i+1}</div>
        <div style="flex:1;padding:0 8px">
          <span class="person-early-label">Left at:</span>
          <input class="person-early-input" type="time" id="early-time-${i}" value="${nowTimeVal()}">
        </div>
        <button onclick="markEarlyOut('${gid}',${i})" style="font-size:11px;padding:5px 10px;border:none;border-radius:6px;background:var(--green);color:#fff;cursor:pointer;font-weight:600">Mark</button>
      </div>`;
    }
  }
  const earlyCount=Object.keys(earlyOuts).length;
  showModal(`<h3>🚶 Early Person Checkout</h3>
    <div class="purple-box" style="background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.2);color:var(--green)">
      Each person can have a different end time. The seat charge will be calculated individually per person based on when they left.
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">${s0.name} · ${persons} persons · Check-in: ${new Date(s0.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
    <div id="early-rows">${rowsHTML}</div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin:10px 0;display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--text3)">Early checkouts marked</span>
      <span style="font-size:14px;font-weight:700;color:var(--green)" id="early-count-disp">${earlyCount} of ${persons}</span>
    </div>
    <button class="btn-pri grn" onclick="saveEarlyOuts('${gid}')">✓ Save & Back to Checkout</button>

          <div><div class="fo-name">${order.name}</div><div class="fo-time">${new Date(order.createdAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})} → ${new Date(order.closedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</div></div>
          <div style="text-align:right"><div class="fo-amt">${inr(order.totalAmount)}</div><span class="tag ${order.method}" style="display:inline-block;margin-top:3px">${order.method.toUpperCase()}</span></div>
        </div>
        <div class="fo-items">${itemList}</div>
      </div>`;
    });
  }

  if(openOrders.length===0&&todayClosedOrders.length===0){
    html+=`<div class="empty">No food orders today.<br>Tap <strong>+ New Order</strong> to start one.</div>`;
  }
  html+='</div>';

}

function startFoodOrder(){

  saveAll();closeModal();
  openFoodOrderCheckout(order.id);
}

      <input id="custom-item-name" placeholder="Item name" style="flex:2;min-width:100px;padding:7px 9px;border-radius:7px;border:1px solid rgba(124,58,237,.3);background:var(--bg2);color:var(--text);font-family:inherit;font-size:12px;outline:none">
      <input id="custom-item-price" type="number" placeholder="₹" min="1" style="width:72px;padding:7px 9px;border-radius:7px;border:1px solid rgba(124,58,237,.3);background:var(--bg2);color:var(--text);font-family:inherit;font-size:12px;outline:none">
      <input id="custom-item-qty" type="number" min="1" value="1" style="width:52px;padding:7px 9px;border-radius:7px;border:1px solid rgba(124,58,237,.3);background:var(--bg2);color:var(--text);font-family:inherit;font-size:12px;outline:none">
      <button onclick="addCustomFoodItem()" style="padding:7px 13px;border-radius:7px;border:none;background:var(--purple);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">Add</button>
    </div>
    <div id="custom-items-list" style="margin-top:8px"></div>
  </div>`;

  showModal(`<h3 style="color:var(--purple)">🍽 ${order.name}</h3>
    <div style="background:var(--purple-bg);border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--purple)">Food-only order · ${new Date(order.createdAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</span>
      <span style="font-size:16px;font-weight:800;color:var(--purple)" id="fc-total">${inr(total)}</span>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px">Menu Items</div>
    <div style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:9px;padding:8px 10px;background:var(--bg3);margin-bottom:10px">${menuHTML}</div>
    ${customItemHTML}
    <div class="phone-box">
      <label class="flabel">📱 WhatsApp number <span style="font-size:10px;font-weight:400;color:var(--blue)">(optional)</span></label>
      <input id="fo-phone" type="tel" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric" value="${order.phone||''}">
    </div>
    <div class="fgrp"><label class="flabel">Payment method</label>
      <div class="pay-row"><button class="pbtn sel" id="fpm-cash" onclick="selFM('cash')">CASH</button><button class="pbtn" id="fpm-upi" onclick="selFM('upi')">UPI</button><button class="pbtn" id="fpm-card" onclick="selFM('card')">CARD</button></div>
    </div>
    <button class="btn-pri purple" id="fo-checkout-btn" onclick="doFoodCheckout('${orderId}')">Checkout — ${inr(total)}</button>
    <button class="btn-sec" onclick="saveFoodDraft('${orderId}')">💾 Save & Continue Later</button>
    <button class="btn-sec" style="border-color:var(--red);color:var(--red)" onclick="cancelFoodOrder('${orderId}')">✕ Cancel Order</button>`);

  selFM(order.method||'cash');

// Custom items in food order (stored separately from menu items)
window._customFoodItems = {};

function addCustomFoodItem(){
  const nameEl=document.getElementById('custom-item-name');
  const priceEl=document.getElementById('custom-item-price');
  const qtyEl=document.getElementById('custom-item-qty');
  const name=nameEl?.value.trim();
  const price=parseFloat(priceEl?.value)||0;
  const qty=parseInt(qtyEl?.value)||1;
  if(!name){alert('Enter item name');return;}
  if(!price||price<=0){alert('Enter valid price');return;}
  // Store as a temporary custom item
  const cid='ci_'+Date.now();
  if(!window._customFoodItems)window._customFoodItems={};
  window._customFoodItems[cid]={name,price,qty};
  nameEl.value='';priceEl.value='';qtyEl.value='1';
  renderCustomItemsList();
  recalcFoodTotal();
}

function removeCustomFoodItem(cid){
  delete window._customFoodItems[cid];
  renderCustomItemsList();
  recalcFoodTotal();
}

function renderCustomItemsList(){
  const container=document.getElementById('custom-items-list');
  if(!container)return;
  const items=window._customFoodItems||{};
  if(!Object.keys(items).length){container.innerHTML='';return;}
  let html='<div style="font-size:10px;color:var(--purple);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Custom items added:</div>';
  Object.entries(items).forEach(([cid,item])=>{
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(124,58,237,.15)">
      <span style="font-size:12px;color:var(--text)">${item.name} ×${item.qty}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;font-weight:700;color:var(--purple)">${inr(item.price*item.qty)}</span>
        <button onclick="removeCustomFoodItem('${cid}')" style="border:none;background:transparent;color:var(--red);cursor:pointer;font-size:14px;line-height:1;padding:0 2px">×</button>
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

function recalcFoodTotal(){
  const menuTotal=Object.entries(_foodCart).reduce((s,[id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?s+it.price*qty:s;},0);
  const customTotal=Object.values(window._customFoodItems||{}).reduce((s,i)=>s+i.price*i.qty,0);
  const total=menuTotal+customTotal;
  const te=document.getElementById('fc-total');if(te)te.textContent=inr(total);
  const btn=document.getElementById('fo-checkout-btn');if(btn)btn.textContent=`Checkout — ${inr(total)}`;
}

let _foodMethod='cash';
function selFM(m){_foodMethod=m;['cash','upi','card'].forEach(x=>{const el=document.getElementById('fpm-'+x);if(el)el.classList.toggle('sel',x===m);});}

function chgFoodCart(itemId,d){
  _foodCart[itemId]=Math.max(0,(_foodCart[itemId]||0)+d);
  if(!_foodCart[itemId])delete _foodCart[itemId];
  const el=document.getElementById('fc-'+itemId);if(el)el.textContent=_foodCart[itemId]||0;
  recalcFoodTotal();
}

function getFoodOrderItems(){
  const menuPart=Object.entries(_foodCart).map(([id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?{name:it.name,price:it.price,qty}:null;}).filter(Boolean);
  const customPart=Object.values(window._customFoodItems||{}).map(i=>({name:i.name,price:i.price,qty:i.qty}));
  return [...menuPart,...customPart];
}

function saveFoodDraft(orderId){
  const order=foodOrders.find(f=>f.id===orderId);if(!order)return;
  const items=getFoodOrderItems();
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const phone=document.getElementById('fo-phone')?.value.trim()||'';
  order.items=items;order.totalAmount=total;order.phone=phone;order.method=_foodMethod;
  window._customFoodItems={};
  saveAll();closeModal();if(currentView==='food')renderFood();
}

function doFoodCheckout(orderId){
  const order=foodOrders.find(f=>f.id===orderId);if(!order)return;
  const items=getFoodOrderItems();
  if(!items.length){alert('Please add at least one item.');return;}
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const phone=document.getElementById('fo-phone')?.value.trim()||'';
  if(phone&&!/^[0-9]{10}$/.test(phone)){alert('Enter valid 10-digit phone or leave blank.');return;}
  order.items=items;order.totalAmount=total;order.status='closed';order.closedAt=Date.now();order.phone=phone;order.method=_foodMethod;
  const tx={id:Date.now(),seatIds:[],name:order.name,phone:phone||'',persons:0,t0:order.createdAt,t1:Date.now(),seatCharge:0,addons:items,totalAmount:total,method:_foodMethod,date:todayStr(),txType:'food',foodOrderId:orderId};
  txns=[tx,...txns];
  window._customFoodItems={};
  saveAll();renderStats();showFoodReceipt(tx);if(currentView==='food')renderFood();
}

// ─── FOOD: ADD MORE ITEMS (after checkout) ───
function editFoodReceiptAddons(txId){
  const tx=txns.find(t=>t.id===txId);if(!tx)return;
  window._customFoodItems={};
  const editCart={};
  if(tx.addons)tx.addons.forEach(a=>{const it=menuItems.find(m=>m.name===a.name);if(it)editCart[it.id]=a.qty;else{// It's a custom item — put back in custom list
    const cid='ci_'+Math.random().toString(36).slice(2);window._customFoodItems[cid]={name:a.name,price:a.price,qty:a.qty};}});
  const cats=[...new Set(menuItems.map(m=>m.category))];
  const menuHTML=cats.map(cat=>`<div style="margin-bottom:8px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">${cat}</div>${menuItems.filter(m=>m.category===cat).map(it=>`<div class="add-row"><div><span style="font-size:12px;color:var(--text)">${it.name}</span><span style="font-size:11px;color:var(--text3);margin-left:4px">${inr(it.price)}</span></div><div style="display:flex;align-items:center;gap:5px"><button class="cbtn" style="width:24px;height:24px;font-size:13px" onclick="chgFoodEditCart('${it.id}',-1,${txId})">−</button><span style="font-size:12px;min-width:14px;text-align:center;color:var(--text)" id="fedit-${it.id}">${editCart[it.id]||0}</span><button class="cbtn" style="width:24px;height:24px;font-size:13px" onclick="chgFoodEditCart('${it.id}',1,${txId})">+</button></div></div>`).join('')}</div>`).join('');
  window._foodEditCart=editCart;window._foodEditTxId=txId;
  const cfTotal=tx.addons?tx.addons.reduce((s,a)=>s+a.price*a.qty,0):0;
  const customListHTML=`<div style="background:rgba(124,58,237,.06);border:1px dashed rgba(124,58,237,.3);border-radius:9px;padding:10px 12px;margin-bottom:10px">
    <div style="font-size:10px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">+ Add Custom Item</div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <input id="fedit-custom-name" placeholder="Item name" style="flex:2;min-width:100px;padding:7px 9px;border-radius:7px;border:1px solid rgba(124,58,237,.3);background:var(--bg2);color:var(--text);font-family:inherit;font-size:12px;outline:none">
      <input id="fedit-custom-price" type="number" placeholder="₹" min="1" style="width:72px;padding:7px 9px;border-radius:7px;border:1px solid rgba(124,58,237,.3);background:var(--bg2);color:var(--text);font-family:inherit;font-size:12px;outline:none">
      <input id="fedit-custom-qty" type="number" min="1" value="1" style="width:52px;padding:7px 9px;border-radius:7px;border:1px solid rgba(124,58,237,.3);background:var(--bg2);color:var(--text);font-family:inherit;font-size:12px;outline:none">
      <button onclick="addFoodEditCustomItem(${txId})" style="padding:7px 13px;border-radius:7px;border:none;background:var(--purple);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Add</button>
    </div>
    <div id="fedit-custom-list" style="margin-top:8px"></div>
  </div>`;
  showModal(`<h3>🍽 Add More Items — ${tx.name}</h3>
    <div class="purple-box">Updating bill for <strong>${tx.name}</strong>. Current total: <strong>${inr(cfTotal)}</strong></div>
    <div style="max-height:175px;overflow-y:auto;border:1px solid var(--border);border-radius:9px;padding:8px 10px;background:var(--bg3);margin-bottom:10px">${menuHTML}</div>
    ${customListHTML}
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700;color:var(--text3)">New Bill Total</span><span style="font-size:20px;font-weight:700;color:var(--purple)" id="fedit-bill-total">${inr(cfTotal)}</span></div>
    <button class="btn-pri purple" onclick="saveFoodEditedAddons(${txId})">✓ Update Food Bill</button>
    <button class="btn-sec" onclick="showFoodReceipt(txns.find(t=>t.id===${txId}))">← Back to Receipt</button>`);
  renderFoodEditCustomList(txId);
  refreshFoodEditTotal(txId);
}

function chgFoodEditCart(itemId,d,txId){
  if(!window._foodEditCart)window._foodEditCart={};
  window._foodEditCart[itemId]=Math.max(0,(window._foodEditCart[itemId]||0)+d);
  if(!window._foodEditCart[itemId])delete window._foodEditCart[itemId];
  const el=document.getElementById('fedit-'+itemId);if(el)el.textContent=window._foodEditCart[itemId]||0;
  refreshFoodEditTotal(txId);
}

function addFoodEditCustomItem(txId){
  const nameEl=document.getElementById('fedit-custom-name');
  const priceEl=document.getElementById('fedit-custom-price');
  const qtyEl=document.getElementById('fedit-custom-qty');
  const name=nameEl?.value.trim(),price=parseFloat(priceEl?.value)||0,qty=parseInt(qtyEl?.value)||1;
  if(!name){alert('Enter item name');return;}if(!price||price<=0){alert('Enter valid price');return;}
  const cid='ci_'+Date.now();
  if(!window._customFoodItems)window._customFoodItems={};
  window._customFoodItems[cid]={name,price,qty};
  nameEl.value='';priceEl.value='';qtyEl.value='1';
  renderFoodEditCustomList(txId);refreshFoodEditTotal(txId);
}

function removeFoodEditCustomItem(cid,txId){
  delete window._customFoodItems[cid];
  renderFoodEditCustomList(txId);refreshFoodEditTotal(txId);
}

function renderFoodEditCustomList(txId){
  const container=document.getElementById('fedit-custom-list');if(!container)return;
  const items=window._customFoodItems||{};
  if(!Object.keys(items).length){container.innerHTML='';return;}
  let html='<div style="font-size:10px;color:var(--purple);font-weight:600;margin-bottom:4px">Custom items:</div>';
  Object.entries(items).forEach(([cid,item])=>{
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(124,58,237,.12)"><span style="font-size:12px">${item.name} ×${item.qty}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:700;color:var(--purple)">${inr(item.price*item.qty)}</span><button onclick="removeFoodEditCustomItem('${cid}',${txId})" style="border:none;background:transparent;color:var(--red);cursor:pointer;font-size:14px;padding:0 2px">×</button></div></div>`;
  });
  container.innerHTML=html;
}

function refreshFoodEditTotal(txId){
  const menuTotal=Object.entries(window._foodEditCart||{}).reduce((s,[id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?s+it.price*qty:s;},0);
  const customTotal=Object.values(window._customFoodItems||{}).reduce((s,i)=>s+i.price*i.qty,0);
  const el=document.getElementById('fedit-bill-total');if(el)el.textContent=inr(menuTotal+customTotal);
}

function saveFoodEditedAddons(txId){
  const tx=txns.find(t=>t.id===txId);if(!tx)return;
  const menuPart=Object.entries(window._foodEditCart||{}).map(([id,qty])=>{const it=menuItems.find(m=>m.id===id);return it?{name:it.name,price:it.price,qty}:null;}).filter(Boolean);
  const customPart=Object.values(window._customFoodItems||{}).map(i=>({name:i.name,price:i.price,qty:i.qty}));
  const newAddons=[...menuPart,...customPart];
  tx.addons=newAddons;tx.totalAmount=newAddons.reduce((s,a)=>s+a.price*a.qty,0);
  // Also update the food order if it exists
  const fo=foodOrders.find(f=>f.id===tx.foodOrderId);
  if(fo){fo.items=newAddons;fo.totalAmount=tx.totalAmount;}
  window._foodEditCart={};window._customFoodItems={};window._foodEditTxId=null;
  saveAll();if(currentView==='report')renderReport();if(currentView==='food')renderFood();
  showFoodReceipt(tx);
}

    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:17px;font-weight:800;letter-spacing:1px;color:var(--text)">${settings.cafeName}</div>

    </div>
    <div class="bill-box" style="font-size:12px">
      <div class="brow"><span class="lbl">Customer</span><span class="val" style="font-weight:700;letter-spacing:.5px">${tx.name.toUpperCase()}</span></div>
      <div style="font-size:10px;color:var(--text3);margin:5px 0 2px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">Items</div>
      ${aoHTML}
      <div style="border-top:1px dashed var(--border2);margin:8px 0"></div>
      <div class="brow"><span class="lbl">Payment</span><span class="tag ${tx.method}">${tx.method.toUpperCase()}</span></div>
      <div style="border-top:2px solid var(--purple);margin:8px 0"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0">
        <span style="font-size:13px;font-weight:700;color:var(--text3);letter-spacing:1px">TOTAL</span>

      </div>
    </div>
    <div class="btn-row">
      <button class="btn-sec" style="flex:1;margin-top:0;border-radius:10px" onclick="printFoodR(${tx.id})">🖨️ Print</button>
      ${tx.phone?`<button class="btn-pri whatsapp" style="flex:1;margin-top:0;border-radius:10px" onclick="sendWhatsApp(${tx.id})">💬 WA</button>`:''}
      <button class="btn-pri purple" style="flex:2;margin-top:0;border-radius:10px;font-size:14px" onclick="doneReceipt()">Done ✓</button>
    </div>
    <button class="btn-sec" style="margin-top:8px;border-color:var(--purple);color:var(--purple);border-width:1.5px;border-radius:10px" onclick="editFoodReceiptAddons(${tx.id})">← Add more items</button>
    <div style="text-align:center;font-size:10px;color:var(--text3);margin-top:8px">Press <strong style="color:var(--text2)">Done</strong> to close</div>`);
}

function reprintFoodReceipt(orderId){
  const tx=txns.find(t=>t.foodOrderId===orderId);
  if(tx)showFoodReceipt(tx);
}

function cancelFoodOrder(orderId){
  if(!confirm('Cancel this food order? It will be removed.'))return;
  foodOrders=foodOrders.filter(f=>f.id!==orderId);
  _activeFoodOrderId=null;_foodCart={};window._customFoodItems={};
  saveAll();renderStats();closeModal();if(currentView==='food')renderFood();
}

function printR(txId){

  const sl=tx.seatIds.map(id=>'#'+String(id).padStart(2,'0')).join(' ');

  <div class="center">
    <div class="shop-name">${settings.cafeName}</div>
    ${settings.address?`<div class="shop-addr">${settings.address}</div>`:''}
    <div class="meta" style="margin-top:5px">${dateStr} &nbsp;·&nbsp; ${timeStr}</div>
  </div>
  <div class="divider-thick"></div>
  <div style="margin-bottom:7px">
    <div style="font-size:15px;font-weight:900;letter-spacing:.5px;font-family:Arial,sans-serif">${tx.name.toUpperCase()}</div>
    <div class="meta" style="margin-top:2px">Seats: ${sl} &nbsp;·&nbsp; ${tx.persons} person${tx.persons>1?'s':''}</div>
  </div>
  <div class="divider-dash"></div>
  <div class="section-hdr">Session Details</div>
  <div class="row"><span class="name">Check-in</span><span class="amt">${inT}</span></div>
  <div class="row"><span class="name">Check-out</span><span class="amt">${outT}</span></div>
  <div class="row"><span class="name">Duration</span><span class="amt">${fmtMins(tx.t1-tx.t0)}</span></div>
<div class="row"><span class="name">Rate (Adult 1st hr)</span><span class="amt">Rs.${settings.firstHourRate||149}</span></div>
<div class="row"><span class="name">Rate (after 1st hr)</span><span class="amt">Rs.${settings.ratePerHour||99}/hr</span></div>
  <div class="divider-single"></div>
  ${seatBreakdownRows}
  ${foodRows}
  <div class="divider-dash"></div>
  <div class="center"><span class="pay-chip">${tx.method.toUpperCase()}</span></div>
  <div class="total-block">
    <span class="total-lbl">Total</span>
    <span class="total-amt">Rs.${Math.round(tx.totalAmount).toLocaleString('en-IN')}</span>
  </div>
