<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Playhouse Billing v1.0</title>
</head>
<body>

<script>

// ===== GLOBALS =====
let customerCounter = 1;
const LOGO = "logo.png"; // keep logo file in same folder

// ===== LOAD & SAVE (UPDATED) =====
async function saveAll(){
  await db.collection("playhouse").doc("data").set({
    settings,
    seats,
    txns,
    menuItems,
    customerCounter
  });
}

async function loadAll(){
  const doc = await db.collection("playhouse").doc("data").get();
  if(doc.exists){
    const data = doc.data();
    settings = data.settings || settings;
    seats = data.seats || seats;
    txns = data.txns || txns;
    menuItems = data.menuItems || menuItems;
    customerCounter = data.customerCounter || 1;
  }
}

// ===== CHECK-IN (AUTO ID) =====
function doCheckin(startId){
  const persons=parseInt(document.getElementById('ci-p').textContent);
  let name=document.getElementById('ci-name').value.trim();

  if(!name){
    name = String(customerCounter).padStart(3,'0');
    customerCounter++;
  }

  const free=seats.filter(s=>!s.occupied&&!s.blocked);
  if(free.length<persons){alert("Not enough seats");return;}

  const toOcc=free.slice(0,persons).map(s=>s.id);
  const gid='g'+Date.now(), t0=Date.now();

  seats=seats.map(s=>toOcc.includes(s.id)?{...s,occupied:true,name,t0,groupId:gid,groupSize:persons}:s);

  saveAll();
}

// ===== CHECKOUT (PHONE VALIDATION) =====
function finalizeCheckout(gid){
  const grp=seats.filter(s=>s.groupId===gid);
  if(!grp.length)return;

  const s0=grp[0], persons=s0.groupSize;
  const sc=calcSeatCharge(s0.t0,persons);
  const ao=calcCartTotal();
  const addons=getCartAddons();

  const phone = document.getElementById('co-phone')?.value || '';

  if(phone && !/^[0-9]{10}$/.test(phone)){
    alert("Enter valid phone number");
    return;
  }

  const tx={
    id:Date.now(),
    seatIds:grp.map(s=>s.id),
    name:s0.name,
    phone,
    persons,
    t0:s0.t0,
    t1:Date.now(),
    seatCharge:sc,
    addons,
    totalAmount:sc+ao,
    method:selectedMethod,
    date:todayStr()
  };

  seats=seats.map(s=>s.groupId===gid?{...s,occupied:false,name:'',t0:null,groupId:null,groupSize:0}:s);

  txns=[tx,...txns];

  saveAll();
  showReceipt(tx);
}

// ===== WHATSAPP =====
function sendWhatsApp(txId){
  const tx = txns.find(t=>t.id===txId);
  if(!tx || !tx.phone){ alert("No phone number"); return; }

  const duration = fmtMins(tx.t1 - tx.t0);
  const ao = tx.addons ? tx.addons.reduce((s,a)=>s+a.price*a.qty,0) : 0;

  const msg = `Hi ${tx.name} 👋\n\nThanks for visiting The Playhouse 🎲\n\n🧾 Bill:\nSeats: ${tx.persons}\nDuration: ${duration}\nSeat: ${inr(tx.seatCharge)}\nFood: ${inr(ao)}\n\nTotal: ${inr(tx.totalAmount)}\n\nVisit again 😊`;

  window.open(`https://wa.me/91${tx.phone}?text=${encodeURIComponent(msg)}`);
}

// ===== RECEIPT PRINT =====
function printR(txId){
  const tx=txns.find(t=>t.id===txId);
  if(!tx)return;

  const ao = tx.addons ? tx.addons.reduce((s,a)=>s+a.price*a.qty,0) : 0;

  const w=window.open('','_blank','width=400,height=720');

  w.document.write(`
  <html>
  <head>
  <style>
  body{font-family:monospace;font-size:12px;width:260px;margin:0 auto;padding:10px;text-align:center}
  .logo{width:100px;margin-bottom:6px}
  .title{font-size:14px;font-weight:bold}
  .sub{font-size:10px;color:#666;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;text-align:left}
  td{padding:3px 0;border-bottom:1px dashed #ddd}
  td:last-child{text-align:right}
  .big{font-size:16px;font-weight:bold}
  </style>
  </head>

  <body>

  <img src="${LOGO}" class="logo">
  <div class="title">The Playhouse</div>
  <div class="sub">Billing v1.0</div>
  <div class="sub">${new Date(tx.t1).toLocaleString('en-IN')}</div>

  <table>
  <tr><td>Customer</td><td>ID: ${tx.name}</td></tr>
  <tr><td>Seats</td><td>${tx.persons}</td></tr>
  <tr><td>Duration</td><td>${fmtMins(tx.t1 - tx.t0)}</td></tr>
  <tr><td>Seat</td><td>${inr(tx.seatCharge)}</td></tr>
  <tr><td>Food</td><td>${inr(ao)}</td></tr>
  <tr><td class="big">TOTAL</td><td class="big">${inr(tx.totalAmount)}</td></tr>
  </table>

  <p style="font-size:10px;color:#aaa;margin-top:10px">Thank you 🎲</p>

  <script>window.onload=function(){window.print();window.close();}</script>

  </body>
  </html>
  `);

  w.document.close();
}

</script>

</body>
</html>
