<!DOCTYPE html>
<html>
<head>
  <title>The Playhouse Cafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    h2 { text-align:center; }
    .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; padding:10px; }
    .seat { padding:10px; border-radius:10px; text-align:center; cursor:pointer; }
    .free { background:#EAF3DE; }
    .occ { background:#FAEEDA; }
    .res { background:#DCEEFF; }
    .modal { position:fixed; top:20%; left:50%; transform:translateX(-50%);
      background:#fff; padding:20px; border-radius:10px; width:300px; display:none; }
    input,button { width:100%; padding:10px; margin:5px 0; }
  </style>
</head>

<body>

<h2>☕ The Playhouse Cafe - Bill Book Version 1.0</h2>

<div class="grid" id="grid"></div>

<div class="modal" id="modal"></div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔧 SETTINGS
let settings = {
  rate: 99,
  resetTime: "23:00"
};

let seats = [];
let resetWarningShown = false;

// 🪑 CREATE SEATS
function mkSeats(){
  let arr = [];
  for(let i=1;i<=48;i++){
    arr.push({id:i, occupied:false, blocked:false});
  }
  return arr;
}

// 📥 LOAD
async function loadAll(){
  const doc = await db.collection("playhouse").doc("data").get();
  if(doc.exists){
    seats = doc.data().seats || mkSeats();
  } else {
    seats = mkSeats();
  }
}

// 💾 SAVE
async function saveAll(){
  await db.collection("playhouse").doc("data").set({ seats });
}

// 🎨 RENDER
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  seats.forEach(s=>{
    let cls = s.free ? "free" : s.occupied ? "occ" : s.blocked ? "res":"free";

    let name = s.name || "";
    let info = s.blockInfo ? (s.blockInfo.date+" "+s.blockInfo.time) : "";

    grid.innerHTML += `
      <div class="seat ${cls}" onclick="seatClick(${s.id})">
        <b>#${s.id}</b><br>
        ${name}<br>
        ${info}
      </div>
    `;
  });
}

// 🖱 CLICK
function seatClick(id){
  const s = seats.find(x=>x.id===id);

  if(!s.occupied && !s.blocked){
    showCheckin(id);
  } else if(s.blocked){
    alert("Reserved");
  } else {
    checkout(id);
  }
}

// 👥 CHECK-IN
function showCheckin(id){
  modal.innerHTML = `
    <h3>Check-in Seat #${id}</h3>
    <input id="name" placeholder="Name">
    <input id="persons" type="number" value="1">
    <button onclick="doCheckin(${id})">Start</button>
    <button onclick="closeModal()">Cancel</button>
  `;
  modal.style.display="block";
}

function doCheckin(id){
  const name = document.getElementById("name").value;
  const p = parseInt(document.getElementById("persons").value);

  seats[id-1] = {
    ...seats[id-1],
    occupied:true,
    name,
    persons:p,
    start:Date.now()
  };

  saveAll();
  closeModal();
  render();
}

// 📅 RESERVE
function showReserve(id){
  modal.innerHTML = `
    <h3>Reserve #${id}</h3>
    <input id="rname" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="date" type="date">
    <input id="time" type="time">
    <button onclick="doReserve(${id})">Reserve</button>
  `;
  modal.style.display="block";
}

function doReserve(id){
  const name = rname.value;
  const phone = phone.value;
  const date = date.value;
  const time = time.value;

  seats[id-1] = {
    ...seats[id-1],
    blocked:true,
    blockInfo:{name,phone,date,time}
  };

  saveAll();
  closeModal();
  render();
}

// 💰 CHECKOUT
function checkout(id){
  const s = seats[id-1];
  const mins = (Date.now()-s.start)/60000;
  const amt = Math.max(1,mins/60)*settings.rate*s.persons;

  if(confirm("Total ₹"+Math.round(amt))){
    sendWhatsApp(s, amt);

    seats[id-1] = {id, occupied:false, blocked:false};
    saveAll();
    render();
  }
}

// 📲 WHATSAPP BILL
function sendWhatsApp(s, amt){
  const msg = `The Playhouse Cafe
Name: ${s.name}
Total: ₹${Math.round(amt)}`;

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// 🔔 REMINDER
setInterval(()=>{
  const now = new Date();

  seats.forEach(s=>{
    if(s.blockInfo && s.blockInfo.phone){
      const t = new Date(s.blockInfo.date+"T"+s.blockInfo.time);
      const diff = (t-now)/60000;

      if(diff<15 && diff>14){
        window.open("https://wa.me/91"+s.blockInfo.phone);
      }
    }
  });
},60000);

// 🔄 RESET SYSTEM
setInterval(()=>{
  const now = new Date();
  const [h,m]=settings.resetTime.split(":");

  const reset = new Date();
  reset.setHours(h,m,0,0);

  if(now>reset) reset.setDate(reset.getDate()+1);

  const diff=(reset-now)/60000;

  if(diff<30 && !resetWarningShown){
    resetWarningShown=true;
    alert("⚠ Reset in 30 mins");
  }

  if(diff<1){
    seats = mkSeats();
    saveAll();
    render();
    resetWarningShown=false;
  }

},60000);

// 🧩 UTIL
function closeModal(){ modal.style.display="none"; }

// 🚀 START
async function start(){
  await loadAll();
  render();
}
start();

</script>

</body>
</html>
