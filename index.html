// ═══ MENU ═══
function renderMenu(){
  const cats=[...new Set(menuItems.map(m=>m.category))];
  let html=`<div style="padding:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:14px;font-weight:600;color:var(--text)">Menu <span style="color:var(--text3);font-weight:400">(${menuItems.length} items)</span></div><button class="btn-pri" style="width:auto;padding:7px 14px;margin-top:0;font-size:12px" onclick="openAddMenuItem()">+ Add Item</button></div>`;
  if(!menuItems.length)html+=`<div class="empty">No menu items yet.</div>`;
  cats.forEach(cat=>{html+=`<div class="sec-lbl" style="margin-top:10px">${cat}</div>`;menuItems.filter(m=>m.category===cat).forEach(item=>{html+=`<div class="menu-item-row"><div><div style="font-size:13px;font-weight:500;color:var(--text)">${item.name}</div><div style="font-size:11px;color:var(--text3)">${item.category}</div></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:13px;font-weight:700;color:var(--gold)">${inr(item.price)}</div><button class="mi-btn" style="border-color:var(--border2);color:var(--text2)" onclick="openEditMenuItem('${item.id}')">Edit</button><button class="mi-btn" style="border-color:rgba(239,68,68,.4);color:var(--red)" onclick="deleteMenuItem('${item.id}')">Del</button></div></div>`;});});
  html+='</div>';document.getElementById('content').innerHTML=html;
}
function openAddMenuItem(){showModal(`<h3>Add Menu Item</h3><div class="fgrp"><label class="flabel">Item name</label><input id="mi-name" placeholder="e.g. Filter Coffee"></div><div class="fgrp"><label class="flabel">Price (₹)</label><input id="mi-price" type="number" min="1" placeholder="e.g. 30"></div><div class="fgrp"><label class="flabel">Category</label><select id="mi-cat">${MENU_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div><button class="btn-pri" onclick="doAddMenuItem()">Add Item</button><button class="btn-sec" onclick="closeModal()">Cancel</button>`);}
function doAddMenuItem(){const name=document.getElementById('mi-name').value.trim(),price=parseFloat(document.getElementById('mi-price').value),category=document.getElementById('mi-cat').value;if(!name||!price||price<=0){alert('Enter valid name and price.');return;}menuItems.push({id:'m'+Date.now(),name,price,category});saveAll();closeModal();if(currentView==='menu')renderMenu();}
function openEditMenuItem(id){const it=menuItems.find(m=>m.id===id);if(!it)return;showModal(`<h3>Edit Item</h3><div class="fgrp"><label class="flabel">Item name</label><input id="mi-name" value="${it.name}"></div><div class="fgrp"><label class="flabel">Price (₹)</label><input id="mi-price" type="number" value="${it.price}"></div><div class="fgrp"><label class="flabel">Category</label><select id="mi-cat">${MENU_CATS.map(c=>`<option${c===it.category?' selected':''}>${c}</option>`).join('')}</select></div><button class="btn-pri" onclick="doEditMenuItem('${id}')">Save</button><button class="btn-sec" onclick="closeModal()">Cancel</button>`);}
function doEditMenuItem(id){const name=document.getElementById('mi-name').value.trim(),price=parseFloat(document.getElementById('mi-price').value),category=document.getElementById('mi-cat').value;if(!name||!price||price<=0){alert('Enter valid name and price.');return;}menuItems=menuItems.map(m=>m.id===id?{...m,name,price,category}:m);saveAll();closeModal();if(currentView==='menu')renderMenu();}
function deleteMenuItem(id){if(!confirm('Delete this item?'))return;menuItems=menuItems.filter(m=>m.id!==id);saveAll();if(currentView==='menu')renderMenu();}

// ═══ REPORT ═══
function renderReport(){
  const dates=allDates(),tx=txnsForDate(reportDate);
  const sessionTx=tx.filter(t=>t.txType!=='food');
  const foodTx=tx.filter(t=>t.txType==='food');
  const rev=tx.reduce((s,t)=>s+t.totalAmount,0);
  const seatRev=sessionTx.reduce((s,t)=>s+t.seatCharge,0);
  const aoRev=tx.reduce((s,t)=>s+(t.addons?t.addons.reduce((a,i)=>a+i.price*i.qty,0):0),0);
  const foodOnlyRev=foodTx.reduce((s,t)=>s+t.totalAmount,0);

  let html=`<div class="rpt"><div class="sec-lbl">Select date</div><div class="date-pills">${dates.slice(0,8).map(d=>`<button class="dpill${d===reportDate?' active':''}" onclick="reportDate='${d}';renderReport()">${d===todayStr()?'Today':new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</button>`).join('')}</div>
    <div class="rpt-stats">
      <div class="rstat"><div class="rstat-v" style="color:var(--gold)">${inr(rev)}</div><div class="rstat-l">Total Revenue</div></div>
      <div class="rstat"><div class="rstat-v">${tx.length}</div><div class="rstat-l">Total Bills</div></div>
      <div class="rstat"><div class="rstat-v">${inr(seatRev)}</div><div class="rstat-l">Seat Revenue</div></div>
      <div class="rstat"><div class="rstat-v">${inr(aoRev)}</div><div class="rstat-l">Food Revenue</div></div>
      ${foodOnlyRev>0?`<div class="rstat" style="border-color:rgba(124,58,237,.3)"><div class="rstat-v" style="color:var(--purple)">${inr(foodOnlyRev)}</div><div class="rstat-l" style="color:var(--purple)">Food-Only Rev</div></div>`:''}
    </div>
    <div class="exp-btns"><button class="exp-btn" onclick="exportCSV('${reportDate}')">📊 Export CSV</button><button class="exp-btn" onclick="exportPDF('${reportDate}')">📄 Export PDF</button></div>`;

  if(tx.length>0){
    html+=`<div class="sec-lbl">Payment breakdown</div><div class="pay-bkdn">`;
    ['cash','upi','card'].forEach(m=>{const mt=tx.filter(t=>t.method===m);if(!mt.length)return;html+=`<div class="pbrow"><span style="font-weight:600;font-size:12px;text-transform:uppercase;color:var(--text)">${m}</span><span style="color:var(--text3);font-size:11px">${mt.length} bill${mt.length>1?'s':''}</span><span style="font-weight:600;font-size:12px;color:var(--gold);font-variant-numeric:tabular-nums">${inr(mt.reduce((s,t)=>s+t.totalAmount,0))}</span></div>`;});
    html+=`</div>`;
    if(sessionTx.length>0){
      html+=`<div class="sec-lbl">Session Transactions (${sessionTx.length})</div>`;
      sessionTx.forEach(t=>{
        const sl=t.seatIds.map(id=>'#'+String(id).padStart(2,'0')).join(', ');
        const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;
        const hasEarlyOuts=t.personBreakdown&&t.personBreakdown.some(p=>p.early);
        html+=`<div class="tx-item"><div style="flex:1;min-width:0">
          <div class="tx-seat">Seats ${sl} · ${t.persons}p · ${fmtMins(t.t1-t.t0)}${hasEarlyOuts?' · 🚶 early outs':''}</div>
          <div class="tx-name">${t.name}</div>
          <div class="tx-time">${new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})} → ${new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
          ${ao>0?`<div class="tx-time" style="color:var(--gold)">Food: ${inr(ao)}</div>`:''}
          ${t.phone?`<div class="tx-time">📱 ${t.phone} <button onclick="sendWhatsApp(${t.id})" style="border:1px solid #25D366;background:transparent;color:#25D366;border-radius:4px;font-size:10px;cursor:pointer;padding:1px 6px;margin-left:4px">WA</button></div>`:''}
        </div><div style="text-align:right;flex-shrink:0;margin-left:10px">
          <div class="tx-amt">${inr(t.totalAmount)}</div>
          <span class="tag ${t.method}">${t.method.toUpperCase()}</span>
          <button class="tx-print" onclick="printR(${t.id})">🖨️ Reprint</button>
        </div></div>`;
      });
    }
    if(foodTx.length>0){
      html+=`<div class="sec-lbl" style="margin-top:12px">Food-Only Orders (${foodTx.length})</div>`;
      foodTx.forEach(t=>{
        const itemList=t.addons?t.addons.map(a=>`${a.name}×${a.qty}`).join(', '):'';
        html+=`<div class="tx-item food-tx"><div style="flex:1;min-width:0">
          <div class="tx-seat" style="color:var(--purple)">🍽 Food Bill Only</div>
          <div class="tx-name">${t.name}</div>
          <div class="tx-time">${new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})} → ${new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="tx-time" style="color:var(--text2)">${itemList}</div>
          ${t.phone?`<div class="tx-time">📱 ${t.phone} <button onclick="sendWhatsApp(${t.id})" style="border:1px solid #25D366;background:transparent;color:#25D366;border-radius:4px;font-size:10px;cursor:pointer;padding:1px 6px;margin-left:4px">WA</button></div>`:''}
        </div><div style="text-align:right;flex-shrink:0;margin-left:10px">
          <div class="tx-amt" style="color:var(--purple)">${inr(t.totalAmount)}</div>
          <span class="tag ${t.method}">${t.method.toUpperCase()}</span>
          <button class="tx-print" onclick="printFoodR(${t.id})">🖨️ Reprint</button>
        </div></div>`;
      });
    }
  }else{html+=`<div class="empty">No transactions on this date.</div>`;}
  html+='</div>';document.getElementById('content').innerHTML=html;
}

function exportCSV(date){const tx=txnsForDate(date);const rows=[['Date','Type','Customer','Phone','Persons','Seats','Check-in','Check-out','Duration(min)','Seat Charge','Food','Total','Payment'],...tx.map(t=>{const sl=t.seatIds.join(' ');const dur=Math.floor((t.t1-t.t0)/60000);const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;return[t.date,t.txType==='food'?'Food-Only':'Session',`"${t.name}"`,t.phone||'',t.persons||0,`"${sl}"`,new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),dur,Math.round(t.seatCharge||0),Math.round(ao),Math.round(t.totalAmount),t.method];})];const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${settings.cafeName.replace(/ /g,'-')}-${date.replace(/ /g,'-')}.csv`;a.click();URL.revokeObjectURL(url);}

function exportPDF(date){const tx=txnsForDate(date);const rev=tx.reduce((s,t)=>s+t.totalAmount,0),seatRev=tx.filter(t=>t.txType!=='food').reduce((s,t)=>s+t.seatCharge,0),aoRev=tx.reduce((s,t)=>s+(t.addons?t.addons.reduce((a,i)=>a+i.price*i.qty,0):0),0),guests=tx.filter(t=>t.txType!=='food').reduce((s,t)=>s+t.persons,0);const rows=tx.map(t=>{const sl=t.seatIds.map(id=>'#'+String(id).padStart(2,'0')).join(', ');const ao=t.addons?t.addons.reduce((s,a)=>s+a.price*a.qty,0):0;return`<tr><td>${t.txType==='food'?'🍽':'🪑'}</td><td>${new Date(t.t0).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}–${new Date(t.t1).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</td><td>${t.name}</td><td>${t.phone||'—'}</td><td style="text-align:center">${t.persons||'—'}</td><td>${fmtMins(t.t1-t.t0)}</td><td style="text-align:right">${t.seatCharge?'Rs.'+Math.round(t.seatCharge).toLocaleString('en-IN'):'—'}</td><td style="text-align:right">${ao?'Rs.'+Math.round(ao).toLocaleString('en-IN'):'—'}</td><td style="text-align:right"><strong>Rs.${Math.round(t.totalAmount).toLocaleString('en-IN')}</strong></td><td>${t.method.toUpperCase()}</td></tr>`;}).join('');const w=window.open('','_blank','width=900,height=700');w.document.write(`<html><head><title>Report</title><style>body{font-family:sans-serif;font-size:13px;padding:28px;max-width:1100px;margin:auto}h1{font-size:20px;margin:0 0 3px}h2{font-size:13px;color:#888;font-weight:normal;margin:0 0 18px}.stats{display:flex;gap:12px;margin-bottom:22px}.stat{border:1px solid #ddd;border-radius:8px;padding:11px 16px;text-align:center;flex:1}.sv{font-size:17px;font-weight:700}.sl{font-size:11px;color:#888;margin-top:2px}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#f5f5f5;padding:7px 8px;text-align:left;border-bottom:2px solid #ddd;font-size:10px;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #eee}tfoot td{background:#f9f9f9;font-weight:700;border-top:2px solid #ddd}.prnbtn{margin-top:20px;padding:10px 22px;background:#BA7517;color:#fff;border:none;border-radius:7px;cursor:pointer}@media print{.prnbtn{display:none}}</style></head><body><h1>${settings.cafeName}</h1><h2>Daily Report — ${new Date(date).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h2><div class="stats"><div class="stat"><div class="sv">Rs.${Math.round(rev).toLocaleString('en-IN')}</div><div class="sl">Total</div></div><div class="stat"><div class="sv">${tx.length}</div><div class="sl">Bills</div></div><div class="stat"><div class="sv">${guests}</div><div class="sl">Guests</div></div><div class="stat"><div class="sv">Rs.${Math.round(seatRev).toLocaleString('en-IN')}</div><div class="sl">Seat Rev</div></div><div class="stat"><div class="sv">Rs.${Math.round(aoRev).toLocaleString('en-IN')}</div><div class="sl">Food Rev</div></div></div><table><thead><tr><th>Type</th><th>Time</th><th>Customer</th><th>Phone</th><th>Persons</th><th>Duration</th><th>Seat</th><th>Food</th><th>Total</th><th>Payment</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="6">TOTAL (${tx.length} bills)</td><td style="text-align:right">Rs.${Math.round(seatRev).toLocaleString('en-IN')}</td><td style="text-align:right">Rs.${Math.round(aoRev).toLocaleString('en-IN')}</td><td style="text-align:right">Rs.${Math.round(rev).toLocaleString('en-IN')}</td><td></td></tr></tfoot></table><button class="prnbtn" onclick="window.print()">🖨️ Print</button></body></html>`);w.document.close();}

function renderSettings(){
  document.getElementById('content').innerHTML=`<div class="settings-wrap">
    <div class="sec-box"><div class="sec-title">Café Details</div>
      <div class="fgrp"><label class="flabel">Café name</label><input id="s-name" value="${settings.cafeName}"></div>
      <div class="fgrp"><label class="flabel">Address (on receipt)</label><input id="s-addr" value="${settings.address}" placeholder="Coimbatore..."></div>
      <div class="fgrp" style="margin-bottom:0"><label class="flabel">Rate per hour per seat (₹)</label><input id="s-rate" type="number" value="${settings.ratePerHour}" min="1"></div>
    </div>
    <div class="sec-box"><div class="sec-title">🔐 Security</div>
      <div class="fgrp"><label class="flabel">Manager PIN</label><input id="s-pin" type="password" value="${settings.pin||''}" placeholder="Enter PIN" maxlength="8"></div>
      <div class="fgrp" style="margin-bottom:0"><label class="flabel">Large bill confirmation threshold (₹)</label><input id="s-threshold" type="number" value="${settings.largeBillThreshold||500}" min="0"></div>
      <div class="hint-box" style="margin-top:10px;margin-bottom:0">Default PIN: <strong>1234</strong></div>
    </div>
    <button class="btn-pri" style="margin-top:0" onclick="saveSettings()">Save All Settings</button>
    <div class="sec-box" style="margin-top:14px"><div class="sec-title">Data</div>
      <button class="btn-sec" style="margin-top:0;border-color:var(--blue);color:var(--blue)" onclick="exportAllCSV()">📊 Export All Transactions</button>
      <button class="btn-sec" style="margin-top:8px;border-color:rgba(239,68,68,.5);color:var(--red)" onclick="requirePIN('Clear All Data',confirmClearData)">⚠ Clear All Data</button>
    </div>
    <div class="hint-box" style="margin-top:12px"><strong>The Playhouse Billing v4.2</strong><br>+ Food-Only Billing · + Custom Items · + Per-Person Early Checkout<br>+ Add More Items (Food) · + Improved Print Receipts<br>Firebase · WhatsApp · Nav Lock · Keyboard PIN<br>Total transactions: <strong>${txns.length}</strong> · Food orders: <strong>${foodOrders.length}</strong></div>
  </div>`;
}
function saveSettings(){settings.cafeName=document.getElementById('s-name').value.trim()||'THE PLAYHOUSE';settings.address=document.getElementById('s-addr').value.trim();settings.ratePerHour=parseFloat(document.getElementById('s-rate').value)||99;settings.pin=document.getElementById('s-pin').value;settings.largeBillThreshold=parseFloat(document.getElementById('s-threshold').value)||500;saveAll();renderStats();const btn=event.target;btn.textContent='✓ Saved!';setTimeout(()=>{btn.textContent='Save All Settings';},1800);}
function confirmClearData(){showModal(`<h3>⚠ Clear All Data?</h3><div class="warn-box">Permanently deletes ALL ${txns.length} transactions and ${foodOrders.length} food orders.</div><button class="btn-sec" style="border-color:var(--blue);color:var(--blue);margin-top:0" onclick="exportAllCSV()">📊 Export First</button><button class="btn-pri red" onclick="doClearData()">Delete Everything</button><button class="btn-sec" onclick="closeModal()">Cancel</button>`);}
function doClearData(){seats=mkSeats();txns=[];foodOrders=[];groupColorMap={};gcIdx=0;coInfo=null;cartItems={};_foodCart={};_activeFoodOrderId=null;customerCounter=1;saveAll();renderStats();closeModal();if(currentView==='settings')renderSettings();else renderFloor();}

// ═══ NAV ═══
function setView(v){
  if(_receiptActive){showNavLockToast();return;}
  if(v==='settings'){requirePIN('Access Settings',()=>doSetView('settings'));return;}
  doSetView(v);
}
function doSetView(v){
  currentView=v;
  ['floor','menu','report','settings','food'].forEach(x=>{const el=document.getElementById('btn-'+x);if(el)el.classList.toggle('active',x===v);});
  if(v==='floor')renderFloor();
  else if(v==='food')renderFood();
  else if(v==='menu')renderMenu();
  else if(v==='report')renderReport();
  else if(v==='settings')renderSettings();
}
function showModal(html){const ov=document.getElementById('overlay');ov.innerHTML=`<div class="mbox">${html}</div>`;ov.style.display='flex';}
function closeModal(){
  if(_receiptActive)return;
  document.getElementById('overlay').style.display='none';
  if(window._coIv){clearInterval(window._coIv);window._coIv=null;}
  _pinActive=false;
}

setInterval(()=>{tickUpdate();if(currentView==='report')renderReport();},1000);
setTimeout(()=>{checkExportBanner();},1500);

async function startApp(){await loadAll();renderStats();renderFloor();checkExportBanner();}
startApp();
 // ═══ KIDS PRICING OVERRIDE v4.4 ═══
// Adults: ₹149 flat 1st hr, then ₹99/hr pro-rata
// Kids (under 10): ₹99 flat 1st hr, then ₹99/hr pro-rata
(function(){
  // ─── Wait until original startApp() finishes loading from Firebase ───
  // We wrap our setup in a small delay so settings/seats are loaded first.
  function applyOverride(){

    // ─── 1. Pricing config (added to settings) ───
    if(!settings.firstHourRate)    settings.firstHourRate    = 149;
    if(!settings.ratePerHour)      settings.ratePerHour      =  99;
    if(!settings.kidFirstHourRate) settings.kidFirstHourRate =  99;
    if(!settings.kidRatePerHour)   settings.kidRatePerHour   =  99;

window._adultCharge = function(mins){
  var r1 = settings.firstHourRate || 149;
  var r2 = settings.ratePerHour   ||  99;
  mins = Math.floor(mins); // ← floor, not ceil
  if(mins <= 60) return r1;
  return r1 + (r2/60) * (mins - 60);
};
window._kidCharge = function(mins){
  var r1 = settings.kidFirstHourRate || 99;
  var r2 = settings.kidRatePerHour   || 99;
  mins = Math.floor(mins); // ← floor, not ceil
  if(mins <= 60) return r1;
  return r1 + (r2/60) * (mins - 60);
};


    // ─── 3. Override calcCheckoutCharge — main billing function ───
    // First `kids` persons in the group are kids, rest are adults.
    window.calcCheckoutCharge = function(t0, persons, earlyOuts, kidsOverride){
      var kids = kidsOverride;
      if(kids == null && coInfo && coInfo.kids != null) kids = coInfo.kids;
      if(kids == null) kids = 0;
      kids = Math.min(kids, persons);
      var now = Date.now();
      var total = 0;
      for(var i = 0; i < persons; i++){
        var endTime = (earlyOuts && earlyOuts[i]) ? earlyOuts[i] : now;
        var mins = (endTime - t0) / 60000;
        total += (i < kids) ? _kidCharge(mins) : _adultCharge(mins);
      }
      return total;
    };

    // ─── 4. Override live floor charge functions ───
    // (Used in some display paths. Worst-cases at adult rate when kids unknown.)
    window.calcSeatCharge = function(t0, persons){
      var mins = (Date.now() - t0) / 60000;
      return _adultCharge(mins) * persons;
    };
    window.calcSeatChargeAtTime = function(t0, t1, persons){
      var mins = (t1 - t0) / 60000;
      return _adultCharge(mins) * persons;
    };

    // ─── 5. Patch openCheckin — add Kids counter ───
    var _origOpenCheckin = openCheckin;
    window.openCheckin = function(startId, prefillName){
      _origOpenCheckin(startId, prefillName || '');
      setTimeout(function(){
        var personsField = document.getElementById('ci-p');
        if(!personsField || document.getElementById('ci-k')) return;
        var personsGroup = personsField.closest('.fgrp');
        if(!personsGroup) return;

        // Relabel "Persons" → "Adults"
        var lbl = personsGroup.querySelector('.flabel');
        if(lbl) lbl.innerHTML = 'Adults';

        // Insert Kids counter after Adults counter
        var kidsHTML =
          '<div class="fgrp">' +
            '<label class="flabel">Kids (under 10) ' +
              '<span style="font-size:10px;color:var(--text3);font-weight:400;text-transform:none">· ' +
              inr(settings.kidFirstHourRate||99) + '/hr</span>' +
            '</label>' +
            '<div class="counter">' +
              '<button class="cbtn" onclick="chgK(-1)">−</button>' +
              '<span class="cval" id="ci-k">0</span>' +
              '<button class="cbtn" onclick="chgK(1)">+</button>' +
              '<span style="font-size:11px;color:var(--text3)">child rate</span>' +
            '</div>' +
          '</div>';
        personsGroup.insertAdjacentHTML('afterend', kidsHTML);

        // Replace hint-box with dual-rate summary
        var hintBox = document.querySelector('.overlay .hint-box');
        if(hintBox){
          var a1 = settings.firstHourRate    || 149;
          var a2 = settings.ratePerHour      ||  99;
          var k1 = settings.kidFirstHourRate ||  99;
          var k2 = settings.kidRatePerHour   ||  99;
          hintBox.innerHTML =
            '<strong>Adult:</strong> ' + inr(a1) + ' flat 1st hr · then ' + inr(a2) + '/hr pro-rata<br>' +
            '<strong>Kid:</strong> '   + inr(k1) + ' flat 1st hr · then ' + inr(k2) + '/hr pro-rata';
        }
      }, 30);
    };

    // Kid counter handler
    window.chgK = function(d){
      var el = document.getElementById('ci-k');
      if(!el) return;
      el.textContent = Math.max(0, parseInt(el.textContent) + d);
    };

    // ─── 6. Patch doCheckin — store adults/kids on seats ───
    var _origDoCheckin = doCheckin;
    window.doCheckin = function(startId){
      var adults = parseInt(document.getElementById('ci-p').textContent) || 0;
      var kids   = parseInt((document.getElementById('ci-k')||{textContent:'0'}).textContent) || 0;
      var totalPersons = adults + kids;
      if(totalPersons < 1){ alert('Add at least 1 adult or kid.'); return; }

      // Force the persons field to total so original logic allocates the right number of seats
      document.getElementById('ci-p').textContent = totalPersons;
      _origDoCheckin(startId);

      // After original runs, find the newest group and tag it with kids/adults
      var newest = seats.filter(function(s){return s.occupied && s.groupId;})
                       .sort(function(a,b){return (b.groupId||'').localeCompare(a.groupId||'');})[0];
      if(newest){
        var gid = newest.groupId;
        seats = seats.map(function(s){
          return s.groupId === gid ? Object.assign({}, s, {adults: adults, kids: kids}) : s;
        });
        saveAll();
        if(currentView === 'floor') renderFloor();
      }
    };

    // ─── 7. Patch openCheckout — load kids into coInfo, show Mix row ───
    var _origOpenCheckout = openCheckout;
    window.openCheckout = function(gid){
      _origOpenCheckout(gid);
      var grp = seats.filter(function(s){return s.groupId === gid;});
      if(!grp.length) return;
      var kids   = grp[0].kids   || 0;
      var adults = grp[0].adults || (grp[0].groupSize - kids);
      if(coInfo && coInfo.gid === gid){
        coInfo.kids   = kids;
        coInfo.adults = adults;
      }
      setTimeout(function(){
        if(typeof refreshCoTotals === 'function') refreshCoTotals();
        if(kids > 0){
          var billBox = document.querySelector('.overlay .bill-box');
          if(billBox && !billBox.querySelector('[data-kids-row]')){
            var seatRow = billBox.querySelector('.brow:nth-child(2)');
            var row = document.createElement('div');
            row.className = 'brow';
            row.setAttribute('data-kids-row','1');
            row.innerHTML =
              '<span class="lbl">Mix</span>' +
              '<span class="val" style="font-size:11px;color:var(--blue)">' +
                adults + ' adult' + (adults!==1?'s':'') + ' · ' +
                kids   + ' kid'   + (kids!==1?'s':'') +
              '</span>';
            if(seatRow) seatRow.insertAdjacentElement('afterend', row);
          }
        }
      }, 30);
    };

    // ─── 8. Patch finalizeCheckout — rebuild personBreakdown with kid/adult flags ───
    var _origFinalize = finalizeCheckout;
    window.finalizeCheckout = function(gid, phone){
      _origFinalize(gid, phone || '');
      var tx = txns[0];
      if(!tx) return;
      var kids = (coInfo && coInfo.kids) || tx.kids || 0;
      // coInfo gets cleared by the original — fall back to seat info
      if(!kids){
        // No way to recover; assume 0 kids (won't happen in normal flow)
        return;
      }
      var persons = tx.persons;
      var earlyOuts = tx.earlyOuts || {};
      var pb = [];
      for(var i = 0; i < persons; i++){
        var endTime = earlyOuts[i] || tx.t1;
        var mins = (endTime - tx.t0) / 60000;
        var isKid = i < kids;
        pb.push({
          person: i + 1,
          endTime: endTime,
          charge: isKid ? _kidCharge(mins) : _adultCharge(mins),
          early: !!earlyOuts[i],
          type: isKid ? 'kid' : 'adult'
        });
      }
      var newSeatCharge = pb.reduce(function(s,p){return s + p.charge;}, 0);
      var addonsTotal = (tx.addons||[]).reduce(function(s,a){return s + a.price * a.qty;}, 0);
      tx.personBreakdown = pb;
      tx.seatCharge = newSeatCharge;
      tx.totalAmount = newSeatCharge + addonsTotal;
      tx.kids = kids;
      tx.adults = persons - kids;
      saveAll();
    };

    // ─── 9. Patch renderFloor — add kid badge to seat tiles ───
    var _origRenderFloor = renderFloor;
    window.renderFloor = function(){
      _origRenderFloor();
      var groupShown = {};
      seats.forEach(function(s){
        if(!s.occupied || !s.kids || s.kids <= 0) return;
        if(groupShown[s.groupId]) return;
        var seatEls = document.querySelectorAll('.seat.occ');
        for(var i = 0; i < seatEls.length; i++){
          var snEl = seatEls[i].querySelector('.sn');
          var expected = '#' + String(s.id).padStart(2,'0');
          if(snEl && snEl.textContent === expected){
            if(!seatEls[i].querySelector('[data-kid-tag]')){
              var badge = document.createElement('span');
              badge.setAttribute('data-kid-tag','1');
              badge.style.cssText = 'position:absolute;bottom:3px;right:5px;background:#3b82f6;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.3px';
              badge.textContent = s.kids + 'K';
              seatEls[i].appendChild(badge);
            }
            groupShown[s.groupId] = true;
            break;
          }
        }
      });
    };

    // ─── 10. Patch renderSettings — add 3 new rate fields ───
    var _origRenderSettings = renderSettings;
    window.renderSettings = function(){
      _origRenderSettings();
      var rateInput = document.getElementById('s-rate');
      if(!rateInput || document.getElementById('s-first-rate')) return;
      var rateGroup = rateInput.closest('.fgrp');
      if(!rateGroup) return;
      var rateLbl = rateGroup.querySelector('.flabel');
      if(rateLbl) rateLbl.textContent = 'Adult — 2nd hour onwards (₹/hr, pro-rata)';
      var extraHTML =
        '<div class="fgrp">' +
          '<label class="flabel">Adult — 1st hour flat rate per person (₹)</label>' +
          '<input id="s-first-rate" type="number" value="' + (settings.firstHourRate||149) + '" min="1">' +
        '</div>' +
        '<div class="fgrp">' +
          '<label class="flabel">Kid (under 10) — 1st hour rate per person (₹)</label>' +
          '<input id="s-kid-first-rate" type="number" value="' + (settings.kidFirstHourRate||99) + '" min="0">' +
        '</div>' +
        '<div class="fgrp">' +
          '<label class="flabel">Kid (under 10) — 2nd hour onwards (₹/hr, pro-rata)</label>' +
          '<input id="s-kid-rate" type="number" value="' + (settings.kidRatePerHour||99) + '" min="0">' +
        '</div>';
      rateGroup.insertAdjacentHTML('beforebegin', extraHTML);
    };

    // ─── 11. Patch saveSettings — persist the 3 new fields ───
    var _origSaveSettings = saveSettings;
    window.saveSettings = function(){
      var fr  = document.getElementById('s-first-rate');
      var kfr = document.getElementById('s-kid-first-rate');
      var kr  = document.getElementById('s-kid-rate');
      if(fr)  settings.firstHourRate    = parseFloat(fr.value)  || 149;
      if(kfr) settings.kidFirstHourRate = parseFloat(kfr.value) ||  99;
      if(kr)  settings.kidRatePerHour   = parseFloat(kr.value)  ||  99;
      _origSaveSettings.apply(this, arguments);
    };

    // ─── 12. Trigger first re-render so changes show immediately ───
    if(typeof renderStats === 'function') renderStats();
    if(currentView === 'floor' && typeof renderFloor === 'function') renderFloor();

    console.log(
      '✅ Playhouse v4.4 (kids pricing) loaded.\n' +
      '   Adult: ₹' + (settings.firstHourRate||149) + ' flat 1hr / ₹' + (settings.ratePerHour||99) + '/hr after\n' +
      '   Kid:   ₹' + (settings.kidFirstHourRate||99) + ' flat 1hr / ₹' + (settings.kidRatePerHour||99) + '/hr after'
    );
  }

  // Apply after a short delay so the original startApp's loadAll() has finished
  setTimeout(applyOverride, 1200);
})();
</script>
